00 g"}, {"name": "Speisestärke (Maisstärke)", "amount": "2 EL"}, {"name": "Öl", "amount": "2–3 EL"}, {"name": "Natron (für \"Eggy Noodles\", optional)", "amount": "1 TL"}]}, {"label": "Sauce", "items": [{"name": "Sojasoße oder Tamari", "amount": "2 EL"}, {"name": "Sesamöl", "amount": "2 TL"}, {"name": "Reisessig", "amount": "2 TL"}, {"name": "Ahornsirup oder brauner Zucker", "amount": "2 TL"}, {"name": "Ingwer, frisch gerieben", "amount": "1 EL"}, {"name": "Rote Chiliflocken", "amount": "½ TL"}, {"name": "Erdnussmus (optional Tahin)", "amount": "1 EL"}]}, {"label": "Zum Servieren", "items": [{"name": "Karotte, in Streifen", "amount": "1"}, {"name": "Erdnüsse, geröstet", "amount": "n. B."}, {"name": "Koriander, frisch", "amount": "n. B."}, {"name": "Rote Zwiebel, eingelegt", "amount": "n. B."}]}], "steps": [{"text": "Tofu-Würfel mit der Speisestärke in einer Schüssel oder einem verschlossenen Behälter vermengen bis alle Seiten gleichmäßig bedeckt sind."}, {"text": "Öl in einer Pfanne bei mittlerer bis hoher Hitze erhitzen. Tofu dazugeben und 2 Minuten pro Seite braten bis er goldbraun und knusprig ist.", "time": "4–6 Min."}, {"text": "Gleichzeitig Nudeln nach Packungsangabe kochen. Tipp für \"Eggy Noodles\": 1 TL Natron ins Kochwasser geben — das gibt den Nudeln eine besondere Textur.", "time": "laut Packung"}, {"text": "Alle Sauce-Zutaten verquirlen."}, {"text": "Pfanne vom Herd nehmen, abgetropfte Nudeln zum Tofu geben, Sauce darübergießen und alles gut vermengen."}, {"text": "In Bowls servieren, mit Karottenstreifen, gerösteten Erdnüssen, Koriander und eingelegter roter Zwiebel toppen."}], "note": "Das Natron im Nudelkochwasser ist ein alter Trick der asiatischen Küche — es erhöht den pH-Wert und gibt den Nudeln eine leicht federnde, ei-artige Textur ohne Ei. Funktioniert auch mit Spaghetti!"}, {"id": "tofu-schokokuchen-hack", "title": "Tofu Schokokuchen (3-Zutaten-Hack)", "eyebrow": "Klingt verrückt, schmeckt wunderbar", "cookbook_name": "Paulis Kochbuch", "servings": "1 Kuchen", "total_time": "60 Min.", "difficulty": "Sehr einfach", "source_handle": "@fitgreenmind", "tags": ["vegan", "Backen", "Dessert"], "meal": ["Dessert", "Snack"], "cuisine": ["International"], "dish_type": ["Dessert"], "ingredient_groups": [{"label": "Kuchen", "items": [{"name": "Vegane Kuchenmischung (400–410 g Trockenmischung)", "amount": "1 Pck."}, {"name": "Seidentofu", "amount": "350 g"}, {"name": "Öl", "amount": "55 g"}]}, {"label": "Frosting", "items": [{"name": "Seidentofu", "amount": "50 g"}, {"name": "Zartbitterschokolade, geschmolzen", "amount": "15 g"}]}], "steps": [{"text": "Alle Kuchenzutaten (Kuchenmischung, Seidentofu, Öl) zu einem glatten Teig mixen."}, {"text": "In eine Backform geben und nach Packungsanweisung der Kuchenmischung backen.", "time": "laut Packung"}, {"text": "Kuchen vollständig auskühlen lassen."}, {"text": "Seidentofu und geschmolzene Schokolade für das Frosting glatt mixen und auf dem abgekühlten Kuchen verstreichen."}], "note": "Der Seidentofu ersetzt hier komplett Eier und Butter — der Kuchen wird dadurch erstaunlich saftig. Wichtig: Achte darauf, dass die Kuchenmischung tatsächlich 400–410 g Trockenmischung enthält, sonst stimmen die Verhältnisse nicht."}, {"id": "tofu-scramble", "title": "Tofu-Scramble mit Nährhefe", "eyebrow": "Herzhaftes Frühstück voller B-Vitamine", "cookbook_name": "Paulis Kochbuch", "servings": "2 Portionen", "total_time": "15 Min.", "difficulty": "Sehr einfach", "tags": ["vegan", "Frühstück", "High-Protein"], "ingredient_groups": [{"label": null, "items": [{"name": "Tofu, fest", "amount": "300 g"}, {"name": "Nährhefe", "amount": "2 EL"}, {"name": "Kurkuma", "amount": "1/2 TL"}, {"name": "Knoblauchpulver", "amount": "1/2 TL"}, {"name": "Schwarzer Pfeffer (Kala Namak optional)", "amount": "n. B."}, {"name": "Olivenöl", "amount": "1 EL"}, {"name": "Frühlingszwiebeln oder Schnittlauch", "amount": "2"}, {"name": "Kirschtomaten (optional)", "amount": "6"}, {"name": "Vollkorntoast (zum Servieren)", "amount": "2–4 Scheiben"}]}], "steps": [{"text": "Tofu mit den Händen oder einer Gabel grob zerbröseln — nicht zu fein, grobe Stücke geben mehr Textur."}, {"text": "Öl in einer Pfanne erhitzen, Tofu dazugeben und bei mittlerer Hitze braten.", "time": "3–4 Min."}, {"text": "Nährhefe, Kurkuma und Knoblauchpulver unterheben. Kräftig würzen — der Tofu ist neutral und braucht Geschmack."}, {"text": "Frühlingszwiebeln und Tomaten dazugeben, nochmals 2 Minuten braten."}, {"text": "Auf Vollkorntoast servieren."}], "note": "Nährhefe liefert natürliche B-Vitamine (aber kein B12 — dafür auf angereicherte Varianten oder ein Supplement setzen). Kala Namak (schwarzes Salz) hat einen leicht schwefeligen Eigengeschmack, der Ei-artig wirkt — optional erhältlich im Bioladen.", "meal": ["Frühstück"], "cuisine": ["International"], "dish_type": ["Frühstück"]}, {"id": "tomaten-erdnuss-suppe", "title": "Tomaten-Erdnuss-Suppe", "eyebrow": "Orientalisch & wärmend", "cookbook_name": "Paulis Kochbuch", "servings": "2 Portionen", "total_time": "25 Min.", "difficulty": "Einfach", "tags": ["vegan", "Suppe", "Asiatisch"], "meal": ["Mittag", "Abendessen"], "cuisine": ["Asiatisch"], "dish_type": ["Suppe/Eintopf"], "ingredient_groups": [{"label": null, "items": [{"name": "Zwiebel", "amount": "1"}, {"name": "Knoblauchzehen", "amount": "2"}, {"name": "Fenchelknolle", "amount": "1"}, {"name": "Öl", "amount": "1 EL"}, {"name": "Rote Currypaste", "amount": "1 EL"}, {"name": "Dosentomaten, stückig", "amount": "400 g"}, {"name": "Wasser", "amount": "350 ml"}, {"name": "Erdnussmus", "amount": "3 EL"}, {"name": "Geriebene Zitronenschale", "amount": "1 Pck."}, {"name": "Rohrzucker", "amount": "n. B."}, {"name": "Aceto balsamico", "amount": "1–2 TL"}, {"name": "Salz", "amount": "n. B."}]}], "steps": [{"text": "Zwiebel und Knoblauch schälen und fein würfeln. Fenchel waschen, putzen und klein würfeln."}, {"text": "Öl in einem Topf erhitzen, Zwiebel, Knoblauch und Fenchel darin anbraten. Currypaste dazugeben und kurz mitbraten."}, {"text": "Dosentomaten und Wasser hinzufügen, mit Salz würzen. Aufkochen und bei geringer Hitze ca. 10 Min. köcheln lassen, bis der Fenchel weich ist.", "time": "10 Min."}, {"text": "Erdnussmus und geriebene Zitronenschale unterrühren, Suppe noch gut 2 Min. ziehen lassen.", "time": "2 Min."}, {"text": "Mit Salz, Rohrzucker und Aceto balsamico abschmecken, in Teller oder Schalen verteilen und servieren."}]}, {"id": "vegan-snickers-bites", "title": "Vegane Snickers Bites", "eyebrow": "5 Zutaten, kein Zucker, viel Wow", "cookbook_name": "Paulis Kochbuch", "servings": "ca. 12 Stück", "total_time": "20 Min. + 1 Std. einfrieren", "difficulty": "Sehr einfach", "source_handle": "@fitgreenmind", "tags": ["vegan", "Dessert", "No-Bake"], "meal": ["Dessert", "Snack"], "cuisine": ["International"], "dish_type": ["Dessert"], "ingredient_groups": [{"label": "Dattel-Karamell", "items": [{"name": "Datteln, entkernt (10 Min. in heißem Wasser eingeweicht)", "amount": "190 g"}, {"name": "Nussmus", "amount": "3 EL"}, {"name": "Prise Salz", "amount": "1 Prise"}]}, {"label": "Basis & Füllung", "items": [{"name": "Dattel-Karamell (aus obiger Menge)", "amount": "75 g"}, {"name": "Haferflockenmehl", "amount": "75 g"}, {"name": "Erdnüsse", "amount": "60 g"}, {"name": "Vegane Schokolade", "amount": "125 g"}]}], "steps": [{"text": "Datteln nach dem Einweichen abgießen. Datteln, Nussmus und Salz zu einem glatten Karamell mixen."}, {"text": "75 g des Dattelkaramells mit dem Haferflockenmehl vermischen bis ein Teig entsteht. In eine ausgelegte Form drücken als Basis."}, {"text": "Restliches Dattelkaramell darauf verteilen, Erdnüsse darüberstreuen."}, {"text": "1 Stunde einfrieren.", "time": "1 Std."}, {"text": "Schokolade schmelzen. Bites aus der Form schneiden und in die Schokolade tauchen. Im Kühlschrank fest werden lassen."}], "note": "Das Dattelkaramell hat zwei Rollen: als Teig-Basis (mit Haferflockenmehl gebunden) und als Karamellfüllung obendrauf — der klassische Snickers-Aufbau, nur mit natürlichen Zutaten. Kühl aufbewahren."}, {"id": "vegane-pizza", "title": "Vegane Pizza mit Gemüse & veganem Käse", "eyebrow": "Freitagabend-Klassiker", "cookbook_name": "Paulis Kochbuch", "servings": "2 Pizzen (3–4 Personen)", "prep_time": "20 Min. + 1 Std. Gehzeit", "cook_time": "12–15 Min.", "difficulty": "Mittel", "tags": ["vegan", "Pizza", "Wochenende"], "ingredient_groups": [{"label": "Teig", "items": [{"name": "Mehl (Typ 550 oder 00)", "amount": "400 g"}, {"name": "Trockenhefe", "amount": "7 g"}, {"name": "Lauwarmes Wasser", "amount": "250 ml"}, {"name": "Olivenöl, Salz, Zucker", "amount": "je 1 TL/EL"}]}, {"label": "Belag", "items": [{"name": "Passata oder Dosentomaten", "amount": "200 ml"}, {"name": "Veganer Käse (Violife / Simply V)", "amount": "150 g"}, {"name": "Paprika, in Streifen", "amount": "1"}, {"name": "Champignons, in Scheiben", "amount": "100 g"}, {"name": "Sojagranulat, eingeweicht & gewürzt", "amount": "80 g"}, {"name": "Rote Zwiebel, in Ringen", "amount": "1/2"}, {"name": "Basilikum, Oregano, Salz", "amount": "n. B."}]}], "steps": [{"text": "Hefe und Zucker im lauwarmen Wasser auflösen (5 Min.), dann mit Mehl, Salz und Öl zu einem glatten Teig kneten.", "time": "10 Min."}, {"text": "Teig zugedeckt gehen lassen bis er sich verdoppelt hat.", "time": "1 Std."}, {"text": "Ofen auf 250°C vorheizen. Sojagranulat mit Sojasoße, Paprika- und Knoblauchpulver würzen."}, {"text": "Teig dünn ausrollen. Passata mit Oregano und Salz würzen und verteilen. Veganen Käse, Gemüse und Sojagranulat belegen."}, {"text": "Im heißen Ofen backen bis der Rand goldbraun und der Käse geschmolzen ist. Mit frischem Basilikum servieren.", "time": "12–15 Min."}], "note": "Veganer Käse schmilzt besser wenn der Ofen wirklich heiß ist — nicht unter 230°C. Violife und Simply V schmelzen am zuverlässigsten. Sojagranulat unter den Belag mischen statt obendrauf — so verschwindet es optisch in der Tomatensauce.", "meal": ["Abendessen", "Mittag"], "cuisine": ["Mediterran"], "dish_type": ["Pizza"]}, {"id": "vegane-taco-bowl", "title": "Vegane Taco Bowl mit Räuchertofu", "eyebrow": "Herzhafte Bowl mit mexikanischem Twist", "cookbook_name": "Paulis Kochbuch", "servings": "2–3 Portionen", "cook_time": "25–30 Min.", "difficulty": "Mittel", "tags": ["vegan", "Bowl", "Mexikanisch"], "ingredient_groups": [{"label": "Guacamole", "items": [{"name": "Avocados", "amount": "2"}, {"name": "Petersilie", "amount": "1/4 Bund"}, {"name": "Limetten", "amount": "2"}, {"name": "Salz & Pfeffer", "amount": "n. B."}]}, {"label": "Süßkartoffeln", "items": [{"name": "Süßkartoffeln", "amount": "2"}]}, {"label": "Räuchertofu", "items": [{"name": "Räuchertofu", "amount": "400 g"}, {"name": "Sojasoße", "amount": "4 EL"}, {"name": "Paprika scharf / Chiliflocken", "amount": "1/2 EL"}, {"name": "Paprika edelsüß", "amount": "2 EL"}, {"name": "Kreuzkümmel", "amount": "1 EL"}, {"name": "Oregano", "amount": "1 EL"}, {"name": "Knoblauchpulver", "amount": "1 EL"}, {"name": "Tomatenmark", "amount": "2 EL"}, {"name": "Salz & Pfeffer", "amount": "n. B."}]}, {"label": "Soße", "items": [{"name": "Sojajoghurt", "amount": "200 g"}, {"name": "Petersilie", "amount": "1/2 Bund"}, {"name": "Knoblauchzehen", "amount": "2"}, {"name": "Limettensaft", "amount": "von 2 Limetten"}, {"name": "Salz", "amount": "2 TL"}]}], "steps": [{"text": "Süßkartoffeln würfeln und im Airfryer bei 195°C oder im Backofen bei 200°C Ober-/Unterhitze garen.", "time": "25 Min. Airfryer / 30 Min. Backofen"}, {"text": "Avocados zerdrücken, Petersilie fein hacken, mit Limettensaft und Salz zur Guacamole vermengen."}, {"text": "Räuchertofu mit Sojasoße, Gewürzen und Tomatenmark marinieren und scharf anbraten bis er kross ist."}, {"text": "Sojajoghurt, gehackte Petersilie, gepressten Knoblauch, Limettensaft und Salz zur Soße verrühren."}, {"text": "Alles in einer Bowl anrichten: Süßkartoffeln, Tofu, Guacamole, Soße."}], "meal": ["Mittag", "Abendessen"], "cuisine": ["Mexikanisch"], "dish_type": ["Bowl"]}, {"i let searchTerm = "";
let active = { meal: new Set(), cuisine: new Set(), dish_type: new Set() };

const MEAL_ORDER    = ["Frühstück","Vorspeise","Mittag","Abendessen","Dessert","Snack","Beilage"];
const CUISINE_ORDER = ["Asiatisch", "Deutsch/Europäisch", "Indisch", "International", "Japanisch", "Koreanisch", "Mediterran", "Mexikanisch", "Pakistanisch"];
const DISH_ORDER    = ["Beilage", "Bowl", "Curry", "Dessert", "Eintopf", "Frühstück", "Klassiker", "Pasta", "Pfanne", "Pizza", "Salat", "Suppe"];

function collect(dim) {
  const s = new Set();
  RECIPES.forEach(r => (r[dim] || []).forEach(v => s.add(v)));
  return [...s];
}
function sorted(vals, order) {
  return [...order.filter(v => vals.includes(v)), ...vals.filter(v => !order.includes(v)).sort()];
}

//  HELPER
// ════════════════════════════════════════════════════════════════
function esc(s) { const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML; }

function metaPills(r) {
  const p = [];
  if (r.servings)  p.push("👥 " + r.servings);
  if (r.prep_time) p.push("🔪 " + r.prep_time);
  if (r.cook_time) p.push("🔥 " + r.cook_time);
  if (!r.prep_time && !r.cook_time && r.total_time) p.push("⏱ " + r.total_time);
  if (r.difficulty) p.push("⚡ " + r.difficulty);
  return p;
}

function starsHtml(n, cls = "s", total = 5) {
  return Array.from({length: total}, (_, i) =>
    `<span class="${cls} ${i < n ? 'on' : 'off'}">★</span>`
  ).join("");
}

function avgRating(id) {
  const rs = RATINGS.filter(r => r.recipe_id === id);
  if (!rs.length) return null;
  return rs.reduce((a, r) => a + r.stars, 0) / rs.length;
}

// ════════════════════════════════════════════════════════════════
//  CHIPS
// ════════════════════════════════════════════════════════════════
function buildChips(containerId, dim, order) {
  const all = sorted(collect(dim), order);
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = "";
  all.forEach(val => {
    const c = document.createElement("div");
    c.className = "chip" + (active[dim].has(val) ? " active" : "");
    c.dataset.dim = dim;
    c.textContent = val;
    c.onclick = () => {
      active[dim].has(val) ? active[dim].delete(val) : active[dim].add(val);
      buildChips(containerId, dim, order);
      renderGrid();
    };
    wrap.appendChild(c);
  });
}

  if (active.meal.size    && !(r.meal      || []).some(v => active.meal.has(v)))    return false;
  if (active.cuisine.size && !(r.cuisine   || []).some(v => active.cuisine.has(v))) return false;
  if (active.dish_type.size && !(r.dish_type || []).some(v => active.dish_type.has(v)))    return false;
  const term = searchTerm.trim().toLowerCase();
  if (!term) return true;
  const hay = [
    r.title || "",
    ...(r.tags || []), ...(r.meal || []), ...(r.cuisine || []), ...(r.dish_type || []),
    ...((r.ingredient_groups || []).flatMap(g => (g.items || []).map(i => i.name || "")))
  ].join(" ").toLowerCase();
  return hay.includes(term);
}

// ════════════════════════════════════════════════════════════════
//  GRID
// ════════════════════════════════════════════════════════════════
function renderGrid() {
  const filtered = RECIPES.filter(matches);
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  document.getElementById("resultBar").textContent = `${filtered.length} von ${RECIPES.length} Rezepten`;
  document.getElementById("empty").style.display = filtered.length ? "none" : "block";

  filtered.forEach(r => {
    const avg = avgRating(r.id);
    const ratingCount = RATINGS.filter(x => x.recipe_id === r.id).length;
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => openModal(r.id);

    card.innerHTML = `
      ${r.eyebrow ? `<p class="card-script">${esc(r.eyebrow)}</p>` : ""}
      <p class="card-title">${esc(r.title)}</p>
      <div class="card-meta">${metaPills(r).map(m => `<span>${m}</span>`).join("")}</div>
      <div class="card-chips">
        ${(r.dish_type || []).map(v => `<span class="card-chip dish">${esc(v)}</span>`).join("")}
      </div>
      ${avg !== null ? `
        <div class="card-rating">
          <div class="stars-small">${starsHtml(Math.round(avg))}</div>
          <span class="card-rating-text">${avg.toFixed(1)} (${ratingCount} Bewertung${ratingCount !== 1 ? "en" : ""})</span>
        </div>` : ""}`;
    grid.appendChild(card);
  });
}

// ════════════════════════════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════════════════════════════
function openModal(id) {
  const r = RECIPES.find(x => x.id === id);
  if (!r) return;
  const modal = document.getElementById("modal");

  const ingsHtml = (r.ingredient_groups || []).map(g => `
    ${g.label ? `<p class="ing-group-label">${esc(g.label)}</p>` : ""}
    <ul class="ing-list">
      ${(g.items || []).map(i =>
        `<li><span>${esc(i.name)}</span><span class="ing-amount">${esc(i.amount)}</span></li>`
      ).join("")}
    </ul>`).join("");

  const stepsHtml = (r.steps || []).map(s => `
    <li class="step">
      <div class="step-text">${esc(s.text)}</div>
      ${s.time ? `<div class="step-time">⏳ ${esc(s.time)}</div>` : ""}
    </li>`).join("");

  const recipeRatings = RATINGS.filter(x => x.recipe_id === id);
  const ratingsHtml = recipeRatings.length === 0
    ? `<p class="no-ratings">Noch keine Bewertungen — das Rezept warten auf seinen ersten Einsatz! 🍽</p>`
    : recipeRatings.map(rv => `
        <div class="rating-item">
          <div class="rating-header">
            <span class="rating-avatar">${esc(rv.emoji)}</span>
            <span class="rating-name">${esc(rv.name)}</span>
            <div class="rating-stars">${starsHtml(rv.stars, "s")}</div>
            ${rv.date ? `<span class="rating-date">${esc(rv.date)}</span>` : ""}
          </div>
          ${rv.comment ? `<p class="rating-comment">"${esc(rv.comment)}"</p>` : ""}
        </div>`).join("");

  const allTags = [...new Set([...(r.tags || []), ...(r.cuisine || []), ...(r.dish_type || [])])];

  modal.innerHTML = `
    <div class="m-hdr">
      <div class="blob b1"></div>
      <button class="m-close" onclick="closeModal()">✕</button>
      ${r.eyebrow ? `<p class="m-script">${esc(r.eyebrow)}</p>` : ""}
      <h2 class="m-title">${esc(r.title)}</h2>
      <div class="m-meta">${metaPills(r).map(m => `<span>${m}</span>`).join("")}</div>
      ${r.source_handle || r.source_url ? `<p class="m-source">Rezept von ${r.source_handle ? esc(r.source_handle) : ""}${r.source_url ? ` · <a href="${r.source_url}" target="_blank">Original ansehen</a>` : ""}</p>` : ""}
    </div>
    <div class="m-body">
      <div class="m-sidebar">
        <p class="m-section">🌿 Zutaten</p>
        ${ingsHtml}
        ${r.note ? `<div class="note-box"><p class="note-title">Notiz</p><p class="note-text">${esc(r.note)}</p></div>` : ""}
      </div>
      <div class="m-main">
        <p class="m-section">🍳 Zubereitung</p>
        <ol class="steps-list">${stepsHtml}</ol>
      </div>
    </div>
    <div class="ratings-section">
      <p class="ratings-title">⭐ Familienbewertungen</p>
      <div class="ratings-list">${ratingsHtml}</div>
    </div>
    <div class="m-footer">
      <div class="m-tags">${allTags.map(t => `<span>${esc(t)}</span>`).join("")}</div>
      <button class="print-btn" onclick="window.print()">Drucken</button>
    </div>`;

  document.getElementById("overlay").classList.add("open");
  document.getElementById("overlay").scrollTop = 0;
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
}

function resetAll() {
  active = { meal: new Set(), cuisine: new Set(), dish_type: new Set() };
  searchTerm = "";
  document.getElementById("searchInput").value = "";
  buildChips("mealChips",    "meal",      MEAL_ORDER);
  buildChips("cuisineChips", "cuisine",   CUISINE_ORDER);
  buildChips("dishChips",    "dish_type", DISH_ORDER);
  renderGrid();
}

document.getElementById("overlay").addEventListener("click", e => { if (e.target.id === "overlay") closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
document.getElementById("searchInput").addEventListener("input", e => { searchTerm = e.target.value; renderGrid(); });

// ── INIT ──
document.getElementById("heroCount").textContent = `${RECIPES.length} Rezepte`;
buildChips("mealChips",    "meal",      MEAL_ORDER);
buildChips("cuisineChips", "cuisine",   CUISINE_ORDER);
buildChips("dishChips",    "dish_type", DISH_ORDER);
renderGrid();
</script>
