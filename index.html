<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paulis Kochbuch</title>
<style>
  :root {
    --cream: #FBF6EC; --cream-deep: #F3ECDD; --tan: #EDD9B5;
    --line: #D8BD92; --terra: #C97B4A; --terra-dark: #8A5A33;
    --sage: #9CAF88; --sage-dark: #6B8050;
    --ink: #3b2a20; --ink-deep: #4A2E18; --muted: #9C7A52;
    --star-on: #F5A623; --star-off: #D8BD92;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: var(--cream); color: var(--ink); }

  /* ── HERO ── */
  .hero {
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, #F3E6CE 0%, #EDD9B5 100%);
    border-bottom: 3px solid var(--terra);
    padding: 36px 24px 22px; text-align: center;
  }
  .hero .blob { position: absolute; border-radius: 50%; opacity: .42; pointer-events: none; }
  .hero .blob.b1 { width: 260px; height: 260px; background: radial-gradient(circle, var(--sage), transparent 70%); top: -120px; left: -90px; }
  .hero .blob.b2 { width: 200px; height: 200px; background: radial-gradient(circle, var(--terra), transparent 70%); bottom: -110px; right: -70px; opacity: .28; }
  .hero-script { position: relative; z-index:1; font-family: 'Brush Script MT', cursive; font-style: italic; font-size: 18px; color: var(--terra-dark); margin-bottom: 6px; }
  .hero-title  { position: relative; z-index:1; font-size: clamp(26px,6vw,40px); font-weight: 700; color: var(--ink-deep); margin-bottom: 4px; }
  .hero-sub    { position: relative; z-index:1; font-family: Arial, sans-serif; font-size: 13px; color: var(--terra-dark); }
  .hero-count  { position: relative; z-index:1; display: inline-block; margin-top: 12px; font-family: Arial, sans-serif; font-size: 11px; color: var(--sage-dark); background: #EAF0E2; padding: 5px 14px; border-radius: 999px; }

  /* ── FILTERS ── */
  .filter-wrap { background: var(--cream-deep); border-bottom: 1.5px solid var(--line); padding: 16px 20px; }
  .search-row  { display: flex; gap: 10px; margin-bottom: 14px; }
  .search-input {
    flex: 1; border: 2px solid var(--terra); border-radius: 12px; padding: 10px 14px;
    font-family: Arial, sans-serif; font-size: 14px; color: var(--ink); background: var(--cream); outline: none;
  }
  .search-input:focus { border-color: var(--sage-dark); }
  .reset-btn {
    border: 2px solid var(--line); background: var(--cream); border-radius: 12px;
    padding: 10px 16px; font-family: Arial, sans-serif; font-size: 13px; font-weight: 600;
    color: var(--terra-dark); cursor: pointer; white-space: nowrap;
  }
  .reset-btn:hover { border-color: var(--terra); }
  .filter-section { margin-bottom: 10px; }
  .filter-section:last-child { margin-bottom: 0; }
  .filter-label { font-family: Arial, sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); font-weight: 700; margin-bottom: 7px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-family: Arial, sans-serif; font-size: 12px; font-weight: 600;
    padding: 5px 12px; border-radius: 999px; cursor: pointer; user-select: none;
    transition: all .15s; border: 1.5px solid var(--line); background: var(--cream); color: var(--ink);
  }
  .chip:hover { border-color: var(--terra); color: var(--terra-dark); }
  .chip.active { color: white; border-color: transparent; }
  .chip[data-dim="meal"].active    { background: var(--terra); }
  .chip[data-dim="cuisine"].active { background: var(--sage-dark); }
  .chip[data-dim="dish"].active    { background: #7B6DAB; }

  /* ── GRID ── */
  .main-wrap { max-width: 1040px; margin: 0 auto; padding: 20px 18px 60px; }
  .result-bar { font-family: Arial, sans-serif; font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
  .card {
    background: var(--cream-deep); border: 1.5px solid var(--line); border-radius: 16px;
    padding: 18px; cursor: pointer; transition: transform .15s, box-shadow .15s, border-color .15s;
    display: flex; flex-direction: column; gap: 8px;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(140,90,50,.14); border-color: var(--terra); }
  .card-script { font-family: 'Brush Script MT', cursive; font-style: italic; font-size: 13px; color: var(--terra-dark); }
  .card-title  { font-size: 17px; font-weight: 700; color: var(--ink-deep); line-height: 1.25; }
  .card-meta   { display: flex; gap: 6px; flex-wrap: wrap; }
  .card-meta span { font-family: Arial, sans-serif; font-size: 10.5px; background: var(--cream); border: 1px solid var(--line); color: var(--terra-dark); padding: 3px 8px; border-radius: 999px; }
  .card-chips  { display: flex; gap: 5px; flex-wrap: wrap; }
  .card-chip   { font-family: Arial, sans-serif; font-size: 9.5px; padding: 2px 8px; border-radius: 999px; }
  .card-chip.meal    { background: #F5E8DC; color: var(--terra-dark); }
  .card-chip.cuisine { background: #EAF0E2; color: var(--sage-dark); }
  .card-chip.dish    { background: #EAE7F5; color: #5A4F8A; }

  /* card rating preview */
  .card-rating { display: flex; align-items: center; gap: 6px; margin-top: auto; }
  .stars-small { display: flex; gap: 1px; }
  .stars-small .s { font-size: 13px; color: var(--star-off); }
  .stars-small .s.on { color: var(--star-on); }
  .card-rating-text { font-family: Arial, sans-serif; font-size: 10.5px; color: var(--muted); }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-family: Arial, sans-serif; }

  /* ── MODAL OVERLAY ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(59,42,32,.48); z-index: 20;
    padding: 16px; overflow-y: auto; justify-content: center; align-items: flex-start;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--cream); border-radius: 18px; max-width: 820px; width: 100%;
    margin: 12px auto; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.25);
  }

  /* modal header */
  .m-hdr {
    position: relative; overflow: hidden;
    padding: 30px 36px 20px;
    background: linear-gradient(135deg, #F3E6CE 0%, #EDD9B5 100%);
    border-bottom: 3px solid var(--terra);
  }
  .m-hdr .blob { position: absolute; border-radius: 50%; opacity: .48; pointer-events: none; }
  .m-hdr .blob.b1 { width: 160px; height: 160px; background: radial-gradient(circle, var(--sage), transparent 70%); top: -70px; right: -50px; }
  .m-close {
    position: absolute; top: 14px; right: 16px; z-index: 2;
    width: 30px; height: 30px; border-radius: 50%; background: var(--cream);
    border: 1.5px solid var(--terra); color: var(--terra-dark); font-size: 15px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    font-family: Arial, sans-serif;
  }
  .m-close:hover { background: var(--terra); color: white; }
  .m-script { position: relative; z-index:1; font-family: 'Brush Script MT', cursive; font-style: italic; font-size: 17px; color: var(--terra-dark); margin-bottom: 5px; }
  .m-title  { position: relative; z-index:1; font-size: clamp(20px,4vw,28px); font-weight: 700; color: var(--ink-deep); margin-bottom: 12px; max-width: 82%; line-height: 1.2; }
  .m-meta   { position: relative; z-index:1; display: flex; gap: 8px; flex-wrap: wrap; }
  .m-meta span { font-family: Arial, sans-serif; font-size: 12px; font-weight: 600; background: var(--cream); border: 1.5px solid var(--terra); color: var(--terra-dark); padding: 5px 12px; border-radius: 999px; }
  .m-source { position: relative; z-index:1; margin-top: 10px; font-family: Arial, sans-serif; font-size: 11px; color: var(--muted); }
  .m-source a { color: var(--muted); }

  /* modal body */
  .m-body    { display: flex; flex-wrap: wrap; }
  .m-sidebar { width: 36%; min-width: 220px; background: var(--cream-deep); padding: 22px 20px; border-right: 2px dashed var(--line); }
  .m-main    { flex: 1; min-width: 260px; padding: 22px 26px; }
  .m-section { font-size: 16px; font-weight: 700; color: var(--terra); margin-bottom: 13px; }
  .ing-group-label { font-family: Arial, sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--sage); font-weight: 700; margin: 12px 0 5px; }
  .ing-group-label:first-child { margin-top: 0; }
  .ing-list { list-style: none; margin-bottom: 14px; }
  .ing-list li { font-family: Arial, sans-serif; font-size: 12.5px; color: var(--ink); padding: 5px 0; border-bottom: 1px dotted var(--line); display: flex; justify-content: space-between; gap: 8px; }
  .ing-list li:last-child { border-bottom: none; }
  .ing-amount { font-weight: 700; color: var(--terra-dark); white-space: nowrap; }
  .note-box { margin-top: 14px; background: var(--cream); border-left: 3px solid var(--sage); padding: 10px 12px; border-radius: 0 8px 8px 0; }
  .note-title { font-family: 'Brush Script MT', cursive; font-style: italic; font-size: 15px; color: var(--sage-dark); margin-bottom: 3px; }
  .note-text  { font-family: Arial, sans-serif; font-size: 11px; color: #5A4632; line-height: 1.5; }
  .steps-list { list-style: none; counter-reset: s; }
  .step { counter-increment: s; position: relative; padding: 0 0 15px 36px; }
  .step::before { content: counter(s); position: absolute; left: 0; top: -1px; width: 24px; height: 24px; background: var(--terra); color: white; font-weight: 700; font-size: 11.5px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .step::after  { content: ''; position: absolute; left: 11.5px; top: 24px; bottom: 0; width: 1.5px; background: var(--line); }
  .step:last-child::after { display: none; }
  .step-text { font-family: Arial, sans-serif; font-size: 12.5px; line-height: 1.6; color: var(--ink); }
  .step-time { display: inline-block; margin-top: 4px; font-size: 10px; background: var(--cream-deep); color: var(--terra-dark); padding: 2px 8px; border-radius: 999px; font-family: Arial, sans-serif; font-weight: 600; }

  /* ── RATINGS SECTION in modal ── */
  .ratings-section {
    border-top: 2px dashed var(--line); padding: 20px 26px;
  }
  .ratings-title { font-size: 16px; font-weight: 700; color: var(--terra); margin-bottom: 16px; }

  /* existing ratings */
  .ratings-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .rating-item {
    background: var(--cream-deep); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 12px 14px;
  }
  .rating-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .rating-avatar { font-size: 22px; line-height: 1; }
  .rating-name   { font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; color: var(--ink-deep); }
  .rating-stars  { display: flex; gap: 2px; }
  .rating-stars .s { font-size: 16px; }
  .rating-stars .s.on { color: var(--star-on); }
  .rating-stars .s.off { color: var(--star-off); }
  .rating-date   { font-family: Arial, sans-serif; font-size: 10px; color: var(--muted); margin-left: auto; }
  .rating-comment { font-family: Arial, sans-serif; font-size: 12.5px; color: var(--ink); font-style: italic; line-height: 1.5; }

  .no-ratings { font-family: Arial, sans-serif; font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 18px; }

  /* ── modal footer ── */
  .m-footer { padding: 14px 26px; border-top: 2px dashed var(--line); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .m-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .m-tags span { font-family: Arial, sans-serif; font-size: 9.5px; background: #EAF0E2; color: var(--sage-dark); padding: 3px 9px; border-radius: 999px; }
  .print-btn { font-family: Arial, sans-serif; font-size: 11.5px; font-weight: 600; background: var(--terra); color: white; border: none; padding: 7px 15px; border-radius: 999px; cursor: pointer; }
  .print-btn:hover { background: var(--terra-dark); }

  @media (max-width: 580px) {
    .m-body { flex-direction: column; }
    .m-sidebar { width: 100%; border-right: none; border-bottom: 2px dashed var(--line); }
    .filter-wrap { padding: 12px 14px; }
    .ratings-section { padding: 16px 18px; }
  }
  @media print {
    .hero, .filter-wrap, .main-wrap { display: none !important; }
    .overlay { position: static; background: none; padding: 0; display: block !important; }
    .modal { box-shadow: none; max-width: 100%; }
    .m-close, .print-btn, .ratings-section { display: none !important; }
  }
</style>
</head>
<body>

<!-- ── HERO ── -->
<div class="hero">
  <div class="blob b1"></div><div class="blob b2"></div>
  <p class="hero-script">Gesammelt &amp; gestaltet mit Liebe</p>
  <h1 class="hero-title">Paulis Kochbuch</h1>
  <p class="hero-sub">Vegan &amp; lecker</p>
  <div class="hero-count" id="heroCount"></div>
</div>

<!-- ── FILTERS ── -->
<div class="filter-wrap">
  <div class="search-row">
    <input class="search-input" id="searchInput" type="text" placeholder="Rezept, Zutat oder Stichwort suchen…">
    <button class="reset-btn" onclick="resetAll()">Zurücksetzen</button>
  </div>
  <div class="filter-section">
    <div class="filter-label">🍳 Mahlzeit</div>
    <div class="chips" id="mealChips"></div>
  </div>
  <div class="filter-section">
    <div class="filter-label">🌍 Küche</div>
    <div class="chips" id="cuisineChips"></div>
  </div>
  <div class="filter-section">
    <div class="filter-label">🍽 Gerichtstyp</div>
    <div class="chips" id="dishChips"></div>
  </div>
</div>

<!-- ── GRID ── -->
<div class="main-wrap">
  <p class="result-bar" id="resultBar"></p>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">Keine Rezepte gefunden — andere Filter versuchen.</div>
</div>

<!-- ── MODAL ── -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
// ════════════════════════════════════════════════════════════════

ne": ["Indisch"], "dish_type": ["Curry"]}, {"id": "auberginensalat-granatapfel", "title": "Gerösteter Auberginensalat mit Granatapfel", "eyebrow": "Crispy, süß-sauer, nussig", "cookbook_name": "Paulis Kochbuch", "servings": "2–3 Portionen", "total_time": "55 Min.", "difficulty": "Einfach", "source_handle": "@thehungrywarrior", "tags": ["vegan", "Salat", "Orientalisch"], "meal": ["Mittag", "Abendessen"], "cuisine": ["Indisch"], "dish_type": ["Salat"], "ingredient_groups": [{"label": "Für das Rösten", "items": [{"name": "Auberginen, mittelgroß", "amount": "3"}, {"name": "Salz", "amount": "n. B."}, {"name": "Olivenöl", "amount": "2 EL"}, {"name": "Gemahlener Cumin", "amount": "1 TL"}, {"name": "Zatar", "amount": "1 TL"}, {"name": "Sumak", "amount": "1 TL"}, {"name": "Granatapfelsirup (alternativ Balsamico)", "amount": "2–3 EL"}, {"name": "Pfeffer", "amount": "n. B."}]}, {"label": "Zum Vermengen", "items": [{"name": "Schalotte, fein gehackt", "amount": "½"}, {"name": "Petersilie, grob gehackt", "amount": "1 Handvoll"}, {"name": "Koriander, grob gehackt", "amount": "1 Handvoll"}, {"name": "Granatapfelkerne", "amount": "2–3 EL"}, {"name": "Mandeln, gehackt & geröstet", "amount": "1 EL"}, {"name": "Pistazien, gehackt & geröstet (ungesalzen)", "amount": "1 EL"}, {"name": "Zitronensaft", "amount": "von ½ Zitrone"}, {"name": "Olivenöl", "amount": "1–2 EL"}, {"name": "Sumak", "amount": "1 TL"}, {"name": "Salz & Pfeffer", "amount": "n. B."}]}], "steps": [{"text": "Auberginen würfeln, salzen und 20 Minuten ziehen lassen. Flüssigkeit mit einem Küchentuch abtupfen.", "time": "20 Min."}, {"text": "Mit Olivenöl, Cumin, Zatar, Sumak, Salz, Pfeffer und Granatapfelsirup vermengen. Auf ein Backblech geben und bei 180°C Umluft ca. 30–40 Min. rösten bis sie weich und leicht karamellisiert sind.", "time": "30–40 Min."}, {"text": "Auberginen etwas abkühlen lassen, dann mit Schalotte, Kräutern, Nüssen, Granatapfelkernen, Zitronensaft, Olivenöl und Sumak vermengen."}, {"text": "Abschmecken und nach Belieben noch etwas Granatapfelsirup dazugeben. Lauwarm oder am nächsten Tag (wenn er durchgezogen ist) servieren."}], "note": "Das Salzen und Abtupfen der Auberginen ist wichtig — es entzieht Wasser und sorgt dafür, dass sie beim Rösten wirklich crispy werden statt matschig. Am nächsten Tag schmeckt dieser Salat noch intensiver."}, {"id": "bananen-nicecream", "title": "Bananen-Nicecream mit Erdnussbutter", "eyebrow": "Cremiges Eis ohne Schuldgefühle", "cookbook_name": "Paulis Kochbuch", "servings": "2 Portionen", "prep_time": "5 Min.", "cook_time": "mind. 4 Std. einfrieren", "difficulty": "Sehr einfach", "tags": ["vegan", "Dessert", "Frühstück"], "ingredient_groups": [{"label": null, "items": [{"name": "Reife Bananen, in Scheiben eingefroren", "amount": "3"}, {"name": "Erdnussbutter", "amount": "2 EL"}, {"name": "Kakao-Nibs", "amount": "1 EL"}, {"name": "Prise Salz", "amount": "1 Prise"}, {"name": "Pflanzenmilch (bei Bedarf)", "amount": "1–2 EL"}]}], "steps": [{"text": "Reife Bananen in Scheiben schneiden und mind. 4 Stunden (am besten über Nacht) einfrieren.", "time": "mind. 4 Std."}, {"text": "Gefrorene Bananenscheiben in einen Hochleistungsmixer oder Foodprozessor geben und mixen — erst bröckelig, dann cremig. Bei Bedarf 1–2 EL Pflanzenmilch ergänzen."}, {"text": "Erdnussbutter und Salz unterrühren."}, {"text": "Sofort als Soft-Eis servieren oder nochmals 30 Minuten einfrieren für festere Konsistenz."}], "note": "Je reifer die Bananen (gelb mit braunen Punkten), desto süßer das Ergebnis — kein Zucker nötig. Kakao-Nibs für Crunch auf top geben, nicht mitmixen.", "meal": ["Dessert", "Frühstück"], "cuisine": ["International"], "dish_type": ["Dessert"]}, {"id": "bombay-aloo", "title": "Bombay Aloo", "eyebrow": "Knusprige gewürzte Kartoffeln", "cookbook_name": "Paulis Kochbuch", "servings": "3–4 Portionen als Beilage", "total_time": "40 Min.", "difficulty": "Einfach", "tags": ["vegan", "Indisch", "Beilage"], "ingredient_groups": [{"label": null, "items": [{"name": "Kartoffeln, festkochend", "amount": "700 g"}, {"name": "Kichererbsenmehl (Besan)", "amount": "3 EL"}, {"name": "Senfkörner", "amount": "1 TL"}, {"name": "Kreuzkümmelsamen", "amount": "1 TL"}, {"name": "Kurkuma", "amount": "1/2 TL"}, {"name": "Garam Masala", "amount": "1 TL"}, {"name": "Chilipulver", "amount": "1/2 TL"}, {"name": "Knoblauchpulver", "amount": "1/2 TL"}, {"name": "Salz", "amount": "1 TL"}, {"name": "Öl", "amount": "3 EL"}, {"name": "Frischer Koriander, Limettensaft", "amount": "n. B."}]}], "steps": [{"text": "Kartoffeln in gut gesalzenem Wasser fast gar kochen (sie sollen noch leicht fest sein). Abgießen, abkühlen lassen, in Würfel oder Scheiben schneiden.", "time": "15 Min."}, {"text": "Kartoffeln mit Kichererbsenmehl und allen Gewürzen in einer Schüssel vermengen bis sie gleichmäßig beschichtet sind."}, {"text": "Öl in einer großen Pfanne erhitzen. Senfkörner dazugeben und warten bis sie anfangen zu springen. Dann Kreuzkümmelsamen kurz mitrösten.", "time": "1 Min."}, {"text": "Kartoffeln in die Pfanne geben und bei mittlerer bis hoher Hitze braten bis sie rundum knusprig und goldbraun sind — nicht zu viel rühren, damit sich eine Kruste bildet.", "time": "15–20 Min."}, {"text": "Mit Koriander und einem Spritzer Limette servieren."}], "note": "Das Kichererbsenmehl ist der entscheidende Trick — es bildet eine dünne, lacey Kruste auf der Kartoffel, die viel knuspriger ist als ungemehlte Kartoffeln. Senfkörner in eine wirklich heiße Pfanne geben und Deckel bereithalten — sie springen stark.", "meal": ["Mittag", "Abendessen"], "cuisine": ["Indisch"], "dish_type": ["Beilage"]}, {"id": "brownie-kuchen-himbeeren", "title": "Chocolate Brownie Kuchen mit Himbeeren", "eyebrow": "Saftig, gesund & überzeugend", "cookbook_name": "Paulis Kochbuch", "servings": "1 Kuchen (ca. 12 Stücke)", "prep_time": "15 Min.", "cook_time": "40 Min.", "difficulty": "Einfach", "source_handle": "@thehungrywarrior", "tags": ["vegan", "Backen", "Dessert"], "meal": ["Dessert", "Snack"], "cuisine": ["International"], "dish_type": ["Dessert"], "ingredient_groups": [{"label": "Teig", "items": [{"name": "Himbeeren", "amount": "2 × 125 g"}, {"name": "Schwarze Bohnen (Dose, abgetropft & gewaschen)", "amount": "240 g"}, {"name": "Pflanzliche Milch", "amount": "200 ml"}, {"name": "Olivenöl", "amount": "70 ml"}, {"name": "Ahornsirup", "amount": "150 ml"}, {"name": "Gemahlene Mandeln", "amount": "100 g"}, {"name": "Dinkelmehl (oder glutenfreie Mehlmischung)", "amount": "150 g"}, {"name": "Kakaopulver", "amount": "70 g"}, {"name": "Backpulver", "amount": "1 TL"}, {"name": "Natron", "amount": "1 TL"}, {"name": "Apfelessig", "amount": "1 EL"}, {"name": "Gemahlene Vanille", "amount": "1 TL"}, {"name": "Salz", "amount": "1 Prise"}]}, {"label": "Optionales Frosting", "items": [{"name": "Avocado", "amount": "1"}, {"name": "Kakaopulver", "amount": "2 EL"}, {"name": "Ahornsirup", "amount": "2 EL"}]}], "steps": [{"text": "Backofen auf 180°C Umluft vorheizen. Backform vorbereiten."}, {"text": "Trockene Zutaten in eine Schüssel geben. Alle feuchten Zutaten inkl. Bohnen (außer den Himbeeren) fein pürieren und zu den trockenen Zutaten geben. Zu einem glatten Teig verarbeiten."}, {"text": "Hälfte der Himbeeren vorsichtig unterheben. Teig in die Backform füllen."}, {"text": "Ca. 40 Min. backen, anschließend vollständig auskühlen lassen.", "time": "40 Min."}, {"text": "Optional: Avocado, Kakaopulver und Ahornsirup zu einem cremigen Frosting mixen, auf dem abgekühlten Kuchen verstreichen und mit der restlichen Hälfte der Himbeeren dekorieren."}], "note": "Die schwarzen Bohnen werden beim Pürieren vollständig unsichtbar und unhörbar — sie machen den Kuchen feucht-saftig und erhöhen den Proteingehalt erheblich. Unbefrorenes Ausgangmaterial: Himbeeren wirklich gut abtropfen lassen, damit der Teig nicht zu feucht wird."}, {"id": "buddha-bowl", "title": "Buddha Bowl mit Quinoa & Tahin-Dressing", "eyebrow": "Bunt, sättigend & nährstoffreich", "cookbook_name": "Paulis Kochbuch", "servings": "2 Portionen", "total_time": "35 Min.", "difficulty": "Einfach", "tags": ["vegan", "Bowl", "High-Protein"], "ingredient_groups": [{"label": "Bowl", "items": [{"name": "Quinoa", "amount": "150 g"}, {"name": "Schwarze Bohnen aus der Dose", "amount": "240 g"}, {"name": "Süßkartoffel", "amount": "1 groß"}, {"name": "Grünkohl oder Babyspinat", "amount": "2 Handvoll"}, {"name": "Kirschtomaten", "amount": "10"}, {"name": "Avocado", "amount": "1"}, {"name": "Olivenöl", "amount": "1 EL"}, {"name": "Salz, Paprika", "amount": "n. B."}]}, {"label": "Tahin-Dressing", "items": [{"name": "Tahin", "amount": "3 EL"}, {"name": "Zitronensaft", "amount": "2 EL"}, {"name": "Knoblauchzehe, gepresst", "amount": "1"}, {"name": "Warmwasser", "amount": "3–4 EL"}, {"name": "Salz", "amount": "n. B."}]}], "steps": [{"text": "Süßkartoffel würfeln, mit Olivenöl, Salz und Paprika vermengen, im Ofen rösten.", "time": "25 Min. bei 200°C"}, {"text": "Quinoa mit doppelter Menge Wasser aufkochen, dann bei niedriger Hitze quellen lassen.", "time": "15 Min."}, {"text": "Grünkohl mit etwas Olivenöl und Salz kurz in der Pfanne anwärmen oder roh verwenden."}, {"text": "Tahin, Zitronensaft, Knoblauch und Wasser glatt rühren, mit Salz abschmecken."}, {"text": "Alle Komponenten in zwei Bowls anrichten: Quinoa als Basis, dann Bohnen, Süßkartoffel, Grünkohl, Tomaten und Avocado drapieren, Dressing darüber."}], "note": "Alle Komponenten lassen sich einzeln vorbereiten und für mehrere Tage im Kühlschrank aufbewahren — ideal für Meal Prep. Dressing separat aufbewahren.", "meal": ["Mittag", "Abendessen"], "cuisine": ["International"], "dish_type": ["Bowl"]}, {"id": "cashew-alfredo", "title": "Veganes Chicken Alfredo mit Cashew-Sauce", "eyebrow": "Cremig wie das Original", "cookbook_name": "Paulis Kochbuch", "servings": "3–4 Portionen", "prep_time": "15 Min. (+ Einweichen)", "cook_time": "20 Min.", "difficulty": "Mittel", "tags": ["vegan", "Pasta", "Komfort-Essen"], "ingredient_groups": [{"label": "Cashew-Alfredo-Sauce", "items": [{"name": "Cashews (mind. 2 Std. eingeweicht)", "amount": "150 g"}, {"name": "Hefeflocken (Nährhefe)", "amount": "4 EL"}, {"name": "Knoblauchzehen", "amount": "4"}, {"name": "Zitronensaft", "amount": "2 EL"}, {"name": "Gemüsebrühe", "amount": "200–250 ml"}, {"name": "Miso-Paste (weiß)", "amount": "1 TL"}, {"name": "Salz & weißer Pfeffer", "amount": "n. B."}]}, {"label": "Pasta & Topping", "items": [{"name": "Fettuccine oder Tagliatelle", "amount": "300 g"}, {"name": "Vegane Hähnchenstücke (z. B. Vivera, LikeMeat)", "amount": "200 g"}, {"name": "Knoblauch", "amount": "2 Zehen"}, {"name": "Frische Petersilie", "amount": "1 Handvoll"}, {"name": "Schwarzer Pfeffer zum Servieren", "amount": "n. B."}]}], "steps": [{"text": "Cashews mindestens 2 Stunden in kaltem Wasser einweichen (oder 20 Min. in heißem Wasser für schnelleres Ergebnis). Abgießen und abspülen.", "time": "mind. 2 Std."}, {"text": "Cashews, Hefeflocken, Knoblauch, Zitronensaft, Miso und Gemüsebrühe im Hochleistungsmixer sehr glatt mixen — mindestens 2 Minuten, bis die Sauce seidig-cremig ist. Mit Salz und weißem Pfeffer abschmecken."}, {"text": "Pasta nach Packungsangabe in gut gesalzenem Wasser kochen. Etwas Nudelwasser auffangen."}, {"text": "Vegane Hähnchenstücke mit etwas Öl in einer Pfanne bei mittlerer Hitze nach Packungsangabe anbraten.", "time": "5–7 Min."}, {"text": "Cashew-Sauce in einem kleinen Topf bei niedriger Hitze erwärmen. Mit Nudelwasser zur gewünschten Konsistenz verdünnen."}, {"text": "Pasta mit der Sauce vermengen, vegane Hähnchenstücke drauflegen, mit Petersilie und schwarzem Pfeffer servieren."}], "note": "Der Schlüssel ist ein guter Hochleistungsmixer — normale Stabmixer geben oft eine körningere Textur. Miso liefert Umami-Tiefe ohne erkennbaren Eigengeschmack. Für die vegane Hähnchen-Komponente sind Vivera und LikeMeat in deutschen Supermärkten gut erhältlich.", "meal": ["Abendessen"], "cuisine": ["Mediterran"], "dish_type": ["Pasta"]}, {"id": "chia-pudding", "title": "Overnight Chia-Pudding mit Beeren", "eyebrow": "Vorbereiten, schlafen, genießen", "cookbook_name": "Paulis Kochbuch", "servings": "1 Portion", "prep_time": "5 Min.", "cook_time": "Über Nacht (mind. 4 Std.)", "difficulty": "Sehr einfach", "tags": ["vegan", "Frühstück", "Meal Prep"], "ingredient_groups": [{"label": null, "items": [{"name": "Chiasamen", "amount": "4 EL"}, {"name": "Pflanzenmilch (z. B. Hafer oder Mandel)", "amount": "200 ml"}, {"name": "Ahornsirup oder Agavendicksaft", "amount": "1 TL"}, {"name": "Vanilleextrakt (optional)", "amount": "1/2 TL"}, {"name": "Mandelmus", "amount": "1 EL"}, {"name": "Gemischte Beeren (frisch oder TK)", "amount": "1 Handvoll"}]}], "steps": [{"text": "Chiasamen, Pflanzenmilch, Ahornsirup und Vanille in einem Glas verrühren."}, {"text": "Nach 5 Minuten nochmals umrühren (damit keine Klumpen entstehen), dann abdecken und in den Kühlschrank stellen.", "time": "Über Nacht"}, {"text": "Am Morgen umrühren — der Pudding sollte dick und gelartig sein. Mit Mandelmus und Beeren toppen und servieren."}], "note": "Das Verhältnis 1:3 (Chia zu Flüssigkeit) ist die verlässliche Grundformel. Für dickeren Pudding weniger Milch, für flüssigeren mehr. Hält sich 3–4 Tage im Kühlschrank.", "meal": ["Frühstück", "Dessert"], "cuisine": ["International"], "dish_type": ["Frühstück"]}, {"id": "edamame-tofu-bowl", "title": "Edamame-Tofu-Bowl mit Sojasauce-Limetten-Dressing", "eyebrow": "Proteinreich & sommerlich leicht", "cookbook_name": "Paulis Kochbuch", "servings": "1 Portion", "total_time": "15 Min.", "difficulty": "Sehr einfach", "tags": ["vegan", "Bowl", "unter 30 Min."], "ingredient_groups": [{"label": "Bowl", "items": [{"name": "Tofu, fest, gewürfelt", "amount": "150 g"}, {"name": "Edamame, gegart", "amount": "100 g"}, {"name": "Gurke, gewürfelt", "amount": "1/2"}, {"name": "Avocado, in Scheiben", "amount": "1/2"}, {"name": "Karotte, geraspelt", "amount": "1"}, {"name": "Sesam, geröstet", "amount": "1 EL"}]}, {"label": "Dressing", "items": [{"name": "Sojasoße", "amount": "2 EL"}, {"name": "Limettensaft", "amount": "1 EL"}, {"name": "Sesamöl", "amount": "1 TL"}, {"name": "Ahornsirup", "amount": "1 TL"}, {"name": "Ingwer, frisch gerieben", "amount": "1 TL"}, {"name": "Knoblauchzehe, gepresst", "amount": "1"}]}], "steps": [{"text": "Tofu-Würfel in einer Pfanne mit etwas Öl von allen Seiten goldbraun anbraten.", "time": "5–6 Min."}, {"text": "Alle Dressing-Zutaten verquirlen."}, {"text": "Edamame, Gurke, Avocado und Karotte in einer Bowl anrichten, Tofu obenauf setzen."}, {"text": "Dressing darüber geben und mit geröstetem Sesam bestreuen."}], "note": "Ca. 25–30 g Protein pro Portion. Für mehr Sättigung eine Handvoll Reis oder Quinoa als Basis ergänzen.", "meal": ["Mittag"], "cuisine": ["Asiatisch"], "dish_type": ["Bowl", "Salat"]}, {"id": "frozen-yogurt-bites", "title": "Erdbeer-Himbeer Frozen Yogurt Bites", "eyebrow": "Gesundes Sommer-Dessert", "cookbook_name": "Paulis Kochbuch", "servings": "6 Portionen", "prep_time": "15 Min.", "cook_time": "1,5–2 Std. (Gefrierzeit)", "difficulty": "Einfach", "source_handle": "@fitfoodieselma", "tags": ["vegan", "Dessert", "Meal Prep"], "ingredient_groups": [{"label": null, "items": [{"name": "Erdbeeren, gewürfelt", "amount": "120 ml / 90 g"}, {"name": "Himbeeren", "amount": "120 ml / 70 g"}, {"name": "Sojajoghurt (natur)", "amount": "120 ml"}, {"name": "Ahornsirup (optional)", "amount": "1 EL"}, {"name": "Vegane Zartbitterschokolade (mind. 70%)", "amount": "100 g"}, {"name": "Kokosöl (optional)", "amount": "1 TL"}]}], "steps": [{"text": "Erdbeeren, Himbeeren und Sojajoghurt vermengen. Für mehr Süße Ahornsirup unterrühren."}, {"text": "Kleine Häufchen auf ein mit Backpapier ausgelegtes Blech setzen."}, {"text": "Im Gefrierfach komplett durchfrieren lassen.", "time": "1,5–2 Std."}, {"text": "Schokolade mit Kokosöl schmelzen. Bites erst eintauchen wenn sie komplett gefroren sind, zügig arbeiten da die Schokolade schnell fest wird."}, {"text": "Luftdicht verschlossen einfrieren. Vor dem Servieren ca. 20 Minuten antauen lassen.", "time": "20 Min. Antauzeit"}], "note": "Im Original wurde griechischer Milchjoghurt verwendet — hier durch Sojajoghurt ersetzt. Schokolade auf Milchfreiheit prüfen (mindestens 70% Kakao ist meist vegan, aber immer das Etikett checken).", "meal": ["Dessert"], "cuisine": ["International"], "dish_type": ["Dessert"]}, {"id": "granatapfel-joghurt-clusters", "title": "Himbeer-Joghurt-Clusters", "eyebrow": "3 Zutaten, viel Eindruck", "cookbook_name": "Paulis Kochbuch", "servings": "ca. 12 Stück", "prep_time": "10 Min.", "cook_time": "1 Std. + 10 Min. einfrieren", "difficulty": "Sehr einfach", "source_handle": "@demylora", "tags": ["vegan", "Dessert", "No-Bake"], "meal": ["Dessert", "Snack"], "cuisine": ["International"], "dish_type": ["Dessert"], "ingredient_groups": [{"label": null, "items": [{"name": "Kokos- oder Sojajoghurt (vegan)", "amount": "1 Becher (ca. 250 ml)"}, {"name": "Himbeeren (frisch oder TK, aufgetaut)", "amount": "ca. 160 g"}, {"name": "Vegane Zartbitterschokolade, geschmolzen", "amount": "150 g"}]}], "steps": [{"text": "Joghurt und Himbeeren in einer Schüssel vermengen. Mit einem Esslöffel cluster-förmige Häufchen auf ein mit Backpapier ausgelegtes Blech setzen. Für 1 Stunde einfrieren.", "time": "1 Std."}, {"text": "Schokolade schmelzen. Jeden gefrorenen Cluster in die flüssige Schokolade tauchen."}, {"text": "Einige frische Himbeeren und etwas Meersalzflocken obenauf streuen."}, {"text": "Nochmals 10 Min. einfrieren bis die Schokolade fest ist.", "time": "10 Min."}, {"text": "Im Kühlschrank aufbewahren und innerhalb weniger Tage genießen."}], "note": "Die Clusters müssen wirklich komplett durchgefroren sein bevor man sie in die Schokolade taucht — sonst zerfallen sie. Zügig arbeiten, damit sie nicht antauen. Getestet und für super lecker befunden — sowohl mit Kokosjoghurt als auch mit Sojajoghurt! (Magali & Pauline)"}, {"id": "himbeer-hibiskus-tiramisu", "title": "Himbeer-Hibiskus-Vanille-Tiramisu", "eyebrow": "No-Bake Sommerdessert", "cookbook_name": "Paulis Kochbuch", "servings": "4–6 Portionen", "prep_time": "20 Min.", "cook_time": "Über Nacht kühlen", "difficulty": "Einfach", "tags": ["vegan", "Dessert", "No-Bake"], "meal": ["Dessert"], "cuisine": ["International"], "dish_type": ["Dessert"], "ingredient_groups": [{"label": "Chia-Himbeerschicht", "items": [{"name": "Gefrorene Himbeeren, aufgetaut", "amount": "120 g"}, {"name": "Chiasamen", "amount": "2 TL"}, {"name": "Ahornsirup", "amount": "1–2 EL"}, {"name": "Vanille", "amount": "½ TL"}]}, {"label": "Cremeschicht & Basis", "items": [{"name": "Hibiskus-Tee, stark aufgebrüht & abgekühlt", "amount": "100–150 ml"}, {"name": "Ahornsirup (optional)", "amount": "1 EL"}, {"name": "Seidentofu, abgetropft", "amount": "1 Pck."}, {"name": "Veganer Skyr oder Quark", "amount": "400 g"}, {"name": "Gefrorene Himbeeren", "amount": "120 g"}, {"name": "Ahornsirup oder Süße nach Wahl", "amount": "1–2 EL"}, {"name": "Vanille", "amount": "1 TL"}, {"name": "Vollkorn-Zwieback", "amount": "10–12 Stück"}]}, {"label": "Optionales Topping", "items": [{"name": "Nussmus", "amount": "n. B."}, {"name": "Frische Himbeeren", "amount": "n. B."}]}], "steps": [{"text": "Himbeeren für die Chia-Schicht mit Chiasamen, Ahornsirup und Vanille verrühren. Einige Minuten quellen lassen. Hibiskus-Tee aufbrühen und abkühlen lassen."}, {"text": "Seidentofu, veganen Skyr/Quark, Himbeeren, Ahornsirup und Vanille zu einer cremigen Masse mixen."}, {"text": "5–6 Zwieback in eine Auflaufform legen und mit etwas Hibiskus-Tee beträufeln. Die Hälfte der Himbeercreme darauf verteilen und mit einem Drittel der Chia-Himbeermischung toppen."}, {"text": "Schichten ein weiteres Mal wiederholen."}, {"text": "Mit der restlichen Chia-Himbeerschicht, Nussmus und frischen Himbeeren dekorieren. Am besten über Nacht im Kühlschrank durchziehen lassen.", "time": "Über Nacht"}], "note": "Ohne Kaffee, ohne Alkohol — perfekt für Kinder und alle, die ein leichteres Tiramisu mögen. Über Nacht kühlen lässt die Schichten schön durchziehen. Veganer Skyr ist in vielen Supermärkten im Kühlregal erhältlich."}, {"id": "kartoffeln-kraeuterquark", "title": "Pellkartoffeln mit veganem Kräuterquark", "eyebrow": "Klassiker, täuschend echt", "cookbook_name": "Paulis Kochbuch", "servings": "2 Portionen", "total_time": "35 Min.", "difficulty": "Sehr einfach", "tags": ["vegan", "Klassiker", "High-Protein"], "ingredient_groups": [{"label": "Kartoffeln", "items": [{"name": "Kartoffeln (festkochend)", "amount": "600 g"}]}, {"label": "Veganer Kräuterquark", "items": [{"name": "Sojajoghurt oder Soja-Quark (z. B. Alpro)", "amount": "400 g"}, {"name": "Schnittlauch, fein geschnitten", "amount": "3 EL"}, {"name": "Dill, frisch oder getrocknet", "amount": "1 EL"}, {"name": "Knoblauchzehe, gepresst", "amount": "1"}, {"name": "Rote Zwiebel, sehr fein gewürfelt", "amount": "1/4"}, {"name": "Zitronensaft", "amount": "1 TL"}, {"name": "Salz & Pfeffer", "amount": "n. B."}]}], "steps": [{"text": "Kartoffeln ungeschält in Salzwasser kochen bis sie weich sind.", "time": "25–30 Min."}, {"text": "Sojajoghurt/-quark mit allen Kräutern, Knoblauch, Zwiebel, Zitronensaft, Salz und Pfeffer verrühren. Mindestens 15 Minuten ziehen lassen damit sich die Aromen entwickeln.", "time": "15 Min. Ziehzeit"}, {"text": "Kartoffeln abgießen, kurz abkühlen lassen, mit dem Kräuterquark servieren."}], "note": "Sojajoghurt (natur, ungesüßt) funktioniert direkt ohne weitere Zutaten als Quark-Ersatz. Für mehr Cremigkeit einen EL Cashewmus unterrühren — das merkt wirklich niemand. Alpro 'Go On' hat von allen Soja-Produkten die ähnlichste Konsistenz zum Original.", "meal": ["Mittag", "Abendessen"], "cuisine": ["Deutsch/Europäisch"], "dish_type": ["Klassiker"]}, {"id": "kichererbsen-bolognese", "title": "Kichererbsen-Bolognese mit Vollkornpasta", "eyebrow": "Klassiker, neu gedacht", "cookbook_name": "Paulis Kochbuch", "servings": "3–4 Portionen", "total_time": "35 Min.", "difficulty": "Dessert", "High-Protein"], "ingredient_groups": [{"label": null, "items": [{"name": "Kichererbsen aus der Dose, abgetropft", "amount": "480 g"}, {"name": "Mandelmus oder Erdnussmus", "amount": "100 g"}, {"name": "Kakaopulver (ungesüßt)", "amount": "4 EL"}, {"name": "Ahornsirup", "amount": "80 ml"}, {"name": "Vanilleextrakt", "amount": "2 TL"}, {"name": "Backpulver", "amount": "1 TL"}, {"name": "Prise Salz", "amount": "1 Prise"}, {"name": "Vegane Schokodrops (optional)", "amount": "60 g"}]}], "steps": [{"text": "Ofen auf 180°C (Ober-/Unterhitze) vorheizen. Backform (ca. 20×20 cm) mit Backpapier auslegen."}, {"text": "Alle Zutaten außer den Schokodrops in einen Mixer geben und zu einem glatten Teig mixen. Der Teig wird sehr dick."}, {"text": "Teig in die Form geben und gleichmäßig verstreichen. Schokodrops obenauf verteilen."}, {"text": "Im Ofen backen bis ein Stäbchen sauber herauskommt.", "time": "22–25 Min."}, {"text": "Komplett abkühlen lassen bevor du schneidest — Brownies werden beim Abkühlen erst richtig fest.", "time": "mind. 20 Min. abkühlen"}], "note": "Den Kichererbsen schmeckt man nichts an — der Kakao überdeckt alles. Die Brownies sind außen leicht krustig und innen feucht-saftig, enthalten mehr Protein und Ballaststoffe als herkömmliche Brownies. Im Kühlschrank 5 Tage haltbar.", "meal": ["Dessert", "Snack"], "cuisine": ["International"], "dish_type": ["Dessert"]}, {"id": "kimchi-jjigae", "title": "Veganes Kimchi Jjigae", "eyebrow": "Koreanischer Kimchi-Eintopf", "cookbook_name": "Paulis Kochbuch", "servings": "2–3 Portionen", "total_time": "30 Min.", "difficulty": "Einfach", "tags": ["vegan", "Koreanisch", "Eintopf"], "ingredient_groups": [{"label": "Umami-Brühe", "items": [{"name": "Getrocknete Shiitake-Pilze", "amount": "5–6"}, {"name": "Heißes Wasser", "amount": "500 ml"}]}, {"label": "Eintopf", "items": [{"name": "Veganes Kimchi (inkl. Kimchi-Saft)", "amount": "300 g"}, {"name": "Seidiger Tofu oder fester Tofu", "amount": "300 g"}, {"name": "Sesamöl (geröstet)", "amount": "1 EL"}, {"name": "Knoblauchzehen, gehackt", "amount": "3"}, {"name": "Zwiebel, in Streifen", "amount": "1"}, {"name": "Gochujang (koreanische Chilipaste)", "amount": "2 EL"}, {"name": "Gochugaru (koreanische Chiliflocken)", "amount": "1 EL"}, {"name": "Sojasoße", "amount": "1 EL"}, {"name": "Zucker oder Ahornsirup", "amount": "1 TL"}, {"name": "Frühlingszwiebeln", "amount": "3"}, {"name": "Reis (zum Servieren)", "amount": "n. B."}]}], "steps": [{"text": "Shiitake-Pilze in heißem Wasser einweichen — das ergibt die Umami-Basis als Ersatz für die traditionelle Anschovisbrühe. Pilze herausnehmen und in Streifen schneiden, Einweichwasser aufbewahren.", "time": "30 Min."}, {"text": "Sesamöl in einem Topf erhitzen. Zwiebel und Knoblauch 2 Minuten anschwitzen."}, {"text": "Kimchi und Kimchi-Saft dazugeben, Gochujang und Gochugaru einrühren, 3–4 Minuten kräftig anbraten bis der Kimchi leicht karamellisiert.", "time": "4 Min."}, {"text": "Pilzbrühe und Shiitake-Streifen dazugeben. Sojasoße und Zucker einrühren. Aufkochen, dann bei mittlerer Hitze köcheln lassen.", "time": "15 Min."}, {"text": "Tofu in grobe Stücke brechen oder schneiden und vorsichtig einlegen. Weitere 5 Minuten ziehen lassen.", "time": "5 Min."}, {"text": "Mit Frühlingszwiebeln garnieren und mit Reis servieren."}], "note": "WICHTIG: Traditionelles Kimchi enthält Fischsauce oder Garnelenpaste — unbedingt veganes Kimchi verwenden und das Etikett checken. Gochujang und Gochugaru in koreanischen oder asiatischen Supermärkten erhältlich, oder online. Je älter das Kimchi, desto tiefer der Geschmack — ideal wenn das Kimchi schon 2–3 Wochen im Kühlschrank steht.", "meal": ["Mittag", "Abendessen"], "cuisine": ["Koreanisch"], "dish_type": ["Suppe/Eintopf"]}, {"id": "klare-zitronengrassuppe", "title": "Klare Zitronengrassuppe", "eyebrow": "Leicht, aromatisch & blitzschnell", "cookbook_name": "Paulis Kochbuch", "servings": "2 Portionen", "total_time": "25 Min.", "difficulty": "Sehr einfach", "tags": ["vegan", "Suppe", "Asiatisch"], "meal": ["Mittag", "Abendessen"], "cuisine": ["Asiatisch"], "dish_type": ["Suppe/Eintopf"], "ingredient_groups": [{"label": null, "items": [{"name": "Glasnudeln", "amount": "100 g"}, {"name": "Knoblauchzehe", "amount": "1"}, {"name": "Ingwer (ca. 20 g)", "amount": "walnussgroß"}, {"name": "Wasser", "amount": "600 ml"}, {"name": "Sojasoße", "amount": "1 EL"}, {"name": "Zitronengraspaste", "amount": "1 EL"}, {"name": "Rohrohrzucker", "amount": "2 TL"}, {"name": "Rote Paprikaschote", "amount": "½"}, {"name": "Zuckerschoten", "amount": "50 g"}, {"name": "Pilze (z. B. Champignons)", "amount": "100 g"}, {"name": "Zitronensaft", "amount": "n. B."}, {"name": "Salz", "amount": "n. B."}]}], "steps": [{"text": "Glasnudeln nach Packungsanweisung einweichen."}, {"text": "Knoblauch und Ingwer schälen, Ingwer grob würfeln. Wasser mit Sojasoße, Zitronengraspaste und Zucker erhitzen. Knoblauch und Ingwer hineinpressen, mit Salz würzen."}, {"text": "Paprika in dünne Streifen, Pilze in Scheiben schneiden. Alles in die Suppe geben und bei geringer Hitze ca. 8 Min. ziehen lassen.", "time": "8 Min."}, {"text": "Glasnudeln abtropfen und kurz in der Suppe gar ziehen lassen."}, {"text": "Mit Salz, etwas Zitronensaft und Zitronengraspaste sowie Rohrohrzucker abschmecken, in Teller oder Schalen verteilen und servieren."}], "note": "Eine der schnellsten Suppen überhaupt — sehr leicht und bekömmlich. Zitronengraspaste ist in den meisten Supermärkten im Asia-Regal erhältlich, oder online."}, {"id": "korean-veggie-pancake", "title": "Koreanischer Gemüse-Pfannkuchen (Yachaejeon)", "eyebrow": "Knusprig außen, saftig innen", "cookbook_name": "Paulis Kochbuch", "servings": "1 großer Pfannkuchen", "total_time": "20 Min.", "difficulty": "Sehr einfach", "source_handle": "@the_foodiediaries", "tags": ["vegan", "Koreanisch", "unter 30 Min."], "meal": ["Frühstück", "Mittag", "Snack"], "cuisine": ["Koreanisch"], "dish_type": ["Pfanne"], "ingredient_groups": [{"label": " "1 TL"}, {"name": "Gemüsebrühe (Kochwasser)", "amount": "150–200 ml"}, {"name": "Paprikapulver", "amount": "1/2 TL"}, {"name": "Salz & Pfeffer", "amount": "n. B."}]}, {"label": "Pasta", "items": [{"name": "Macaroni oder kurze Pasta", "amount": "300 g"}]}], "steps": [{"text": "Kartoffeln und Karotten in Gemüsebrühe oder Salzwasser weich kochen. Kochwasser auffangen.", "time": "15 Min."}, {"text": "Pasta nach Packungsangabe al dente kochen."}, {"text": "Kartoffeln, Karotten, Hefeflocken, Cashewmus, Knoblauch, Zitronensaft, Sojasoße, Senf und Paprikapulver mit 150 ml Kochwasser im Mixer glatt mixen. Die Sauce sollte dick und cremig sein — bei Bedarf mehr Kochwasser ergänzen."}, {"text": "Sauce mit Salz und Pfeffer abschmecken, mit der Pasta vermengen und sofort servieren."}], "note": "Die orange Farbe von Karotte und Paprikapulver macht die Sauce täuschend echt käse-optisch. Nährhefe ist der Schlüssel zum 'käsigen' Geschmack — nicht weglassen. Schmeckt auch Nicht-Veganern, wenn man die Zutaten nicht verrät.", "meal": ["Mittag", "Abendessen"], "cuisine": ["International"], "dish_type": ["Pasta"]}, {"id": "mango-moehren-suppe", "title": "Mango-Möhren-Suppe", "eyebrow": "Cremig, fruchtig & exotisch", "cookbook_name": "Paulis Kochbuch", "servings": "2 Portionen", "total_time": "25 Min.", "difficulty": "Sehr einfach", "tags": ["vegan", "Suppe", "Asiatisch"], "meal": ["Mittag", "Abendessen"], "cuisine": ["Asiatisch"], "dish_type": ["Suppe/Eintopf"], "ingredient_groups": [{"label": null, "items": [{"name": "Snack-Möhren", "amount": "300 g"}, {"name": "Öl", "amount": "1 EL"}, {"name": "TK-Zwiebel-Duo", "amount": "1 Pck."}, {"name": "Wasser mit Kräutersalz", "amount": "¼ l"}, {"name": "Kokosmilch", "amount": "200 ml"}, {"name": "Mangofruchtsauce", "amount": "200 ml"}, {"name": "Bourbon-Vanillezucker", "amount": "1 Pck."}, {"name": "Geriebene Zitronenschale", "amount": "1 Pck."}, {"name": "Ingwerpulver", "amount": "gut 1 TL"}, {"name": "Cayennepfeffer", "amount": "½ TL"}, {"name": "Balsamico bianco", "amount": "1 EL"}, {"name": "Salz & Gewürzmischung", "amount": "n. B."}]}], "steps": [{"text": "Möhren klein schneiden. Öl in einem Topf erhitzen, Möhren und Zwiebel-Duo darin andünsten."}, {"text": "Mit Kräutersalzwasser aufgießen, aufkochen und bei geringer bis mittlerer Hitze köcheln lassen.", "time": "5 Min."}, {"text": "Kokosmilch und Mangofruchtsauce dazugießen, erneut aufkochen und weitere 5 Min. köcheln lassen.", "time": "5 Min."}, {"text": "Suppe mit dem Pürierstab fein pürieren."}, {"text": "Vanillezucker, Zitronenschale, Ingwerpulver und Cayennepfeffer mischen. 1 TL davon mit Balsamico bianco unter die Suppe rühren. Mit Salz und Gewürzmischung abschmecken, servieren."}], "note": "Die Gewürzmischung (Vanille, Zitrone, Ingwer, Cayenne) macht mehr als sie klingt — sie gibt der Suppe eine unerwartete Tiefe. Rest in ein Schraubglas füllen und z. B. für eine Kürbissuppe aufbewahren."}, {"id": "mango-sticky-oatmeal", "title": "Mango Sticky Oatmeal", "eyebrow": "Sticky Rice, neu gedacht", "cookbook_name": "Paulis Kochbuch", "servings": "1 Portion", "total_time": "15 Min.", "difficulty": "Einfach", "tags": ["vegan", "Frühstück", "unter 30 Min."], "meal": ["Frühstück", "Dessert"], "cuisine": ["Asiatisch"], "dish_type": ["Frühstück"], "ingredient_groups": [{"label": "Kokosnuss-Haferflocken", "items": [{"name": "Schnelle Haferflocken", "amount": "½ cup (ca. 50 g)"}, {"name": "Kokosmilch (Dose)", "amount": "½ cup (ca. 120 ml)"}, {"name": "Mandelmilch (ungesüßt)", "amount": "½ cup (ca. 120 ml)"}, {"name": "Brauner Zucker", "amount": "1 TL"}, {"name": "Chiasamen", "amount": "1 TL"}, {"name": "Salz", "amount": "1 Prise"}, {"name": "Vanilleextrakt", "amount": "¼ TL"}]}, {"label": "Kokosnuss-Sauce", "items": [{"name": "Kokosmilch (Dose)", "amount": "½ cup (ca. 120 ml)"}, {"name": "Brauner Zucker", "amount": "1 TL"}, {"name": "Speisestärke", "amount": "1 TL"}, {"name": "Salz", "amount": "1 Prise"}]}, {"label": "Topping", "items": [{"name": "Mango, in Scheiben", "amount": "½"}, {"name": "Sesamsamen", "amount": "n. B."}]}], "steps": [{"text": "Alle Haferflocken-Zutaten in einem Topf bei mittlerer Hitze unter Rühren köcheln bis die Masse cremig ist. Vom Herd nehmen.", "time": "4–5 Min."}, {"text": "Für die Sauce: alle Zutaten außer der Speisestärke in einem kleinen Topf bei mittlerer Hitze erwärmen. Speisestärke mit 1 EL kaltem Wasser glatt rühren, dann in den Topf einrühren und köcheln bis die Sauce eindickt.", "time": "3 Min."}, {"text": "Haferflocken in eine Schüssel geben, Kokosnuss-Sauce darübergießen, mit Mango-Scheiben und Sesamsamen toppen."}], "note": "Das Verhältnis von Kokosmilch und Mandelmilch gibt den Haferflocken die cremige, leicht klebrige Textur von Sticky Rice — ohne Reis. Die Kokosnuss-Sauce ist der Game-Changer: unbedingt machen und nicht weglassen."}, {"id": "miso-ramen-tofu", "title": "Einfache Miso-Ramen mit gebratenem Tofu", "eyebrow": "Schnelles Feierabend-Nudelglück", "cookbook_name": "Paulis Kochbuch", "servings": "2 Portionen", "total_time": "30 Min.", "difficulty": "Einfach", "source_handle": "@alfiecooks", "tags": ["vegan", "Asiatisch", "unter 30 Min."], "ingredient_groups": [{"label": "Für die Brühe", "items": [{"name": "Miso-Paste", "amount": "n. B."}, {"name": "Kokosmilch", "amount": "n. B."}, {"name": "Heiße Gemüsebrühe", "amount": "n. B."}, {"name": "Gewürze nach Wahl", "amount": "n. B."}]}, {"label": "Für die Toppings", "items": [{"name": "Tofu, in Scheiben", "amount": "n. B."}, {"name": "Brokkolini (Tenderstem)", "amount": "n. B."}, {"name": "Ramen-Nudeln (vegan)", "amount": "n. B."}, {"name": "Frühlingszwiebeln, Sesam", "amount": "n. B."}]}], "steps": [{"text": "Miso-Paste, Kokosmilch und heiße Gemüsebrühe in einen Topf geben und würzen."}, {"text": "Brühe verquirlen und köcheln lassen bis sie aufgekocht ist."}, {"text": "Tofu und Brokkolini würzen und in einer Pfanne scharf anbraten bis beides Röststreifen hat."}, {"text": "Nudeln nach Packungsangabe kochen."}, {"text": "Nudeln und Brühe in eine Schüssel geben, mit Tofu und Brokkolini toppen, mit Frühlingszwiebeln und Sesam garnieren."}], "note": "Mengenangaben wurden im Originalpost nicht beziffert — nach Gefühl und Geschmack dosieren, insbesondere Miso-Paste und Brühe. Ramen-Nudeln auf Eierfreiheit prüfen, da manche Varianten Ei enthalten.", "meal": ["Mittag", "Abendessen"], "cuisine": ["Asiatisch", "Japanisch"], "dish_type": ["Suppe/Eintopf"]}, {"id": "mousse-au-chocolat-tofu", "title": "Mousse au Chocolat", "eyebrow": "Vegan, proteinreich & täuschend echt", "cookbook_name": "Paulis Kochbuch", "servings": "4 Portionen", "prep_time": "10 Min.", "cook_time": "4 Std. kühlen", "difficulty": "Sehr einfach", "source_handle": "@lea.martine", "tags": ["vegan", "Dessert", "High-Protein"], "meal": ["Dessert"], "cuisine": ["International"], "dish_type": ["Dessert"], "ingredient_groups": [{"label": null, "items": [{"name": "Seidentofu", "amount": "400 g"}, {"name": "Zartbitterschokolade (70%)", "amount": "190 g"}, {"name": "Vanille", "amount": "¼ TL"}, {"name": "Ahornsirup (oder mehr nach Geschmack)", "amount": "3 EL"}]}], "steps": [{"text": "Zartbitterschokolade im Wasserbad schmelzen. (Thermomix: 3–5 Min., 50°C, Stufe 1)", "time": "5 Min."}, {"text": "Geschmolzene Schokolade zusammen mit Seidentofu, Vanille und Ahornsirup in einen Mixer geben und 1 Minute auf höchster Stufe mixen bis die Masse vollkommen glatt und cremig ist. (Thermomix: 30–60 Sek., Stufe 3 bis 9)", "time": "1 Min."}, {"text": "In eine Schale oder in Portionsgläser füllen und mindestens 4 Stunden im Kühlschrank kühlen — am besten über Nacht.", "time": "mind. 4 Std."}], "note": "Den Seidentofu schmeckt man überhaupt nicht — er gibt nur Cremigkeit und Protein. Je hochwertiger die Schokolade, desto besser das Ergebnis. Über Nacht kühlen lassen ergibt eine festere, noch intensivere Mousse."}, {"id": "no-bake-frosted-brownies", "title": "No-Bake Frosted Brownies", "eyebrow": "Ohne Backen, ohne raffinierten Zucker", "cookbook_name": "Paulis Kochbuch", "servings": "ca. 16 Stücke", "total_time": "20 Min. + Kühlzeit", "difficulty": "Sehr einfach", "source_handle": "@mrshollingsworths", "tags": ["vegan", "Dessert", "No-Bake"], "meal": ["Dessert", "Snack"], "cuisine": ["International"], "dish_type": ["Dessert"], "ingredient_groups": [{"label": "Brownie-Basis", "items": [{"name": "Datteln, entkernt", "amount": "1¼ Cups (ca. 185 g)"}, {"name": "Erdnussmus", "amount": "¼ Cup (ca. 65 g)"}, {"name": "Kakaopulver", "amount": "⅓ Cup (ca. 35 g)"}, {"name": "Gemahlene Mandeln", "amount": "½ Cup (ca. 55 g)"}]}, {"label": "Frosting", "items": [{"name": "Erdnussmus", "amount": "150 g"}, {"name": "Vegane Zartbitterschokolade", "amount": "250 g"}]}], "steps": [{"text": "Alle Brownie-Zutaten im Mixer zu einer klebrigen, formbaren Masse verarbeiten. In eine mit Backpapier ausgelegte eckige Form (ca. 20 cm) drücken."}, {"text": "Schokolade im Wasserbad über sehr geringem Hitze schmelzen. Erdnussmus einrühren bis alles glatt verbunden ist."}, {"text": "Frosting über die Brownie-Basis gießen und gleichmäßig verteilen."}, {"text": "Im Kühlschrank fest werden lassen, dann in Stücke schneiden und servieren.", "time": "mind. 1 Std. kühlen"}], "note": "Die Datteln müssen weich und frisch sein — falls sie trocken sind, kurz in warmem Wasser einweichen. Das Frosting aus Schokolade und Erdnussmus ergibt eine Schicht, die wie ein richtiges Ganache-Frosting wirkt."}, {"id": "one-pan-tofu-gemuse", "title": "One-Pan Tofu-Gemüsepfanne mit Erdnusssauce", "eyebrow": "Wok-Style in einer Pfanne", "cookbook_name": "Paulis Kochbuch", "servings": "2 Portionen", "total_time": "25 Min.", "difficulty": "Einfach", "tags": ["vegan", "Asiatisch", "unter 30 Min."], "ingredient_groups": [{"label": "Pfanne", "items": [{"name": "Tofu, fest, gewürfelt", "amount": "300 g"}, {"name": "Paprika, in Streifen", "amount": "2"}, {"name": "Brokkoli, in Röschen", "amount": "200 g"}, {"name": "Zuckerschoten oder Erbsen", "amount": "100 g"}, {"name": "Karotte, in dünnen Scheiben", "amount": "1"}, {"name": "Knoblauchzehen, gehackt", "amount": "3"}, {"name": "Ingwer, gerieben", "amount": "1 TL"}, {"name": "Sesamöl", "amount": "1 EL"}, {"name": "Reis oder Reisnudeln (zum Servieren)", "amount": "n. B."}]}, {"label": "Erdnusssauce", "items": [{"name": "Erdnussmus", "amount": "3 EL"}, {"name": "Sojasoße", "amount": "3 EL"}, {"name": "Limettensaft", "amount": "1 EL"}, {"name": "Ahornsirup", "amount": "1 EL"}, {"name": "Warmwasser", "amount": "4 EL"}]}], "steps": [{"text": "Sauce: Alle Zutaten glatt rühren und beiseite stellen."}, {"text": "Tofu in einer großen Pfanne mit Sesamöl bei hoher Hitze kross anbraten, dann beiseite stellen.", "time": "5–6 Min."}, {"text": "Karotte und Brokkoli in derselben Pfanne bei hoher Hitze anbraten.", "time": "3 Min."}, {"text": "Paprika, Zuckerschoten, Knoblauch und Ingwer dazugeben und weitere 2–3 Minuten braten — Gemüse soll knackig bleiben."}, {"text": "Tofu zurück in die Pfanne, Erdnusssauce darüber geben und alles kurz vermengen. Mit Reis oder Nudeln servieren."}], "meal": ["Mittag", "Abendessen"], "cuisine": ["Asiatisch"], "dish_type": ["Pfanne"]}, {"id": "one-pot-dal", "title": "One Pot Dal", "eyebrow": "25 Minuten, eine Pfanne, perfekt", "cookbook_name": "Paulis Kochbuch", "servings": "3–4 Portionen", "total_time": "25 Min.", "difficulty": "Sehr einfach", "source_handle": "@fitgreenmind", "tags": ["vegan", "Indisch", "unter 30 Min."], "meal": ["Mittag", "Abendessen"], "cuisine": ["Indisch"], "dish_type": ["Curry"], "ingredient_groups": [{"label": null, "items": [{"name": "Knoblauchzehen, gehackt", "amount": "2"}, {"name": "Ingwer, daumengroß", "amount": "1 Stück"}, {"name": "Öl", "amount": "etwas"}, {"name": "Kreuzkümmel", "amount": "1 TL"}, {"name": "Gemahlener Koriander", "amount": "1 TL"}, {"name": "Currypulver", "amount": "1 TL"}, {"name": "Paprikapulver", "amount": "½ TL"}, {"name": "Chili (optional)", "amount": "n. B."}, {"name": "Tomatenmark", "amount": "2 EL"}, {"name": "Rote Linsen", "amount": "200 g"}, {"name": "Kokosmilch (Dose)", "amount": "300 ml"}, {"name": "Wasser", "amount": "300 ml"}, {"name": "Limettensaft", "amount": "von ½ Limette"}, {"name": "Salz", "amount": "n. B."}, {"name": "Frischer Koriander & Naan", "amount": "zum Servieren"}]}], "steps": [{"text": "Knoblauch und Ingwer in etwas Öl anschwitzen."}, {"text": "Alle Gewürze und Tomatenmark dazugeben und kurz mitrösten bis es duftet."}, {"text": "Rote Linsen, Kokosmilch und Wasser einrühren. Gut vermengen, abdecken und bei mittlerer Hitze köcheln lassen bis die Linsen weich und cremig eingekocht sind.", "time": "15–20 Min."}, {"text": "Mit Limettensaft und Salz abschmecken. Mit frischem Koriander, Limette und Naan servieren."}], "note": "Tipp von Mama & Pauline: mit gebratenen Zwiebeln als Topping wird es noch besser! Rote Linsen müssen nicht eingeweicht werden und kochen komplett weich — perfektes Wochentags-Gericht."}, {"id": "palak-tofu", "title": "Palak Tofu", "eyebrow": "Vegane Palak Paneer", "cookbook_name": "Paulis Kochbuch", "servings": "3–4 Portionen", "total_time": "35 Min.", "difficulty": "Mittel", "tags": ["vegan", "Indisch", "High-Protein"], "ingredient_groups": [{"label": "Tofu", "items": [{"name": "Fester Tofu, gut ausgedrückt", "amount": "400 g"}, {"name": "Nährhefe", "amount": "1 EL"}, {"name": "Salz, Pfeffer", "amount": "n. B."}, {"name": "Öl zum Braten", "amount": "1 EL"}]}, {"label": "Spinat-Curry", "items": [{"name": "Frischer Blattspinat", "amount": "500 g"}, {"name": "Zwiebel, fein gehackt", "amount": "1 groß"}, {"name": "Knoblauchzehen", "amount": "4"}, {"name": "Ingwer, frisch gerieben", "amount": "2 cm"}, {"name": "Grüne Chilischote (nach Toleranz)", "amount": "1"}, {"name": "Tomate, gehackt", "amount": "1"}, {"name": "Kokosmilch oder Cashewcreme", "amount": "100 ml"}, {"name": "Kreuzkümmelsamen", "amount": "1 TL"}, {"name": "Korianderpulver", "amount": "1 TL"}, {"name": "Kurkuma", "amount": "1/2 TL"}, {"name": "Garam Masala", "amount": "1 TL"}, {"name": "Zitronensaft", "amount": "1 EL"}, {"name": "Öl", "amount": "2 EL"}, {"name": "Salz", "amount": "n. B."}]}], "steps": [{"text": "Tofu in Würfel schneiden, mit Nährhefe, Salz und Pfeffer vermengen, in Öl von allen Seiten goldbraun anbraten. Beiseite stellen.", "time": "6–8 Min."}, {"text": "Spinat kurz in kochendem Salzwasser blanchieren (1–2 Min.), in Eiswasser abschrecken, gut ausdrücken und im Mixer zu einem glatten Püree mixen.", "time": "5 Min."}, {"text": "Kreuzkümmelsamen im Öl anrösten bis sie duften. Zwiebeln goldbraun braten.", "time": "5–6 Min."}, {"text": "Knoblauch, Ingwer und Chili dazugeben, 1 Minute braten. Tomate, Kurkuma und Korianderpulver einrühren und 3 Minuten köcheln."}, {"text": "Spinatpüree einrühren und 3 Minuten mitkochen. Kokosmilch und Garam Masala dazugeben.", "time": "3 Min."}, {"text": "Tofu-Würfel vorsichtig unterheben, mit Zitronensaft und Salz abschmecken. Mit Basmati-Reis oder Naan servieren."}], "note": "Tofu in Salzwasser kochen (statt anbraten) gibt eine weichere, paneer-ähnliche Textur — empfehlenswert wenn es möglichst nah am Original sein soll. Kokosmilch gibt eine sehr authentische Cremigkeit; wer den Kokos-Geschmack nicht mag, kann Cashewcreme verwenden.", "meal": ["Abendessen"], "cuisine": ["Indisch"], "dish_type": ["Curry"]}, {"id": "paprika-gulasch", "title": "Veganes Paprika-Gulasch", "eyebrow": "Ungarisch inspiriertes Soulfood", "cookbook_name": "Paulis Kochbuch", "servings": "4 Portionen", "total_time": "50 Min.", "difficulty": "Einfach", "tags": ["vegan", "Europäisch", "Komfort-Essen"], "ingredient_groups": [{"label": null, "items": [{"name": "Rote und gelbe Paprika", "amount": "4 groß"}, {"name": "Kartoffeln, gewürfelt", "amount": "400 g"}, {"name": "Seitan oder Räuchertofu, gewürfelt", "amount": "250 g"}, {"name": "Zwiebeln, in Streifen", "amount": "2"}, {"name": "Knoblauchzehen", "amount": "3"}, {"name": "Dosentomaten", "amount": "400 g"}, {"name": "Gemüsebrühe", "amount": "400 ml"}, {"name": "Rosenpaprika (edelsüß)", "amount": "3 EL"}, {"name": "Geräuchertes Paprikapulver", "amount": "1 TL"}, {"name": "Kreuzkümmel", "amount": "1 TL"}, {"name": "Lorbeerblätter", "amount": "2"}, {"name": "Tomatenmark", "amount": "2 EL"}, {"name": "Apfelessig", "amount": "1 EL"}, {"name": "Öl", "amount": "2 EL"}, {"name": "Salz & Pfeffer", "amount": "n. B."}, {"name": "Veganer Sauerrahm oder Sojajoghurt", "amount": "4 EL"}]}], "steps": [{"text": "Zwiebeln in Öl bei mittlerer Hitze langsam golden braten — das gibt Süße und Tiefe.", "time": "8–10 Min."}, {"text": "Knoblauch dazugeben, kurz mitbraten. Tomatenmark einrühren und 2 Minuten anrösten."}, {"text": "Paprikapulver (edelsüß und geräuchert) und Kreuzkümmel einrühren — 30 Sekunden rösten, dann sofort mit einem Schuss Gemüsebrühe ablöschen damit das Paprika nicht bitter wird.", "time": "1 Min."}, {"text": "Seitan oder Räuchertofu, Paprikastreifen und Kartoffeln dazugeben. Dosentomaten, restliche Brühe und Lorbeerblätter einrühren."}, {"text": "Zugedeckt köcheln bis die Kartoffeln weich sind.", "time": "25 Min."}, {"text": "Lorbeerblätter entfernen. Mit Apfelessig, Salz und Pfeffer abschmecken. Mit einem Klecks veganem Sauerrahm und Brot oder Nudeln servieren."}], "note": "Paprikapulver NIEMALS in trocken heiße Pfanne geben — es verbrennt sofort und wird bitter. Immer mit etwas Flüssigkeit ablöschen. Seitan gibt eine fleischähnlichere Textur, Räuchertofu ist einfacher erhältlich. Schmeckt am nächsten Tag noch besser.", "meal": ["Abendessen"], "cuisine": ["Deutsch/Europäisch"], "dish_type": ["Eintopf"]}, {"id": "pea-fritters", "title": "Erbsen-Fritters mit Kräuter-Joghurt-Dip", "eyebrow": "Knusprig, proteinreich & unterschätzt", "cookbook_name": "Paulis Kochbuch", "servings": "2–3 Portionen", "total_time": "25 Min.", "difficulty": "Einfach", "source_handle": "@jacobking", "tags": ["vegan", "Snack", "High-Protein"], "meal": ["Mittag", "Snack", "Vorspeise"], "cuisine": ["International"], "dish_type": ["Pfanne"], "ingredient_groups": [{"label": "Fritters", "items": [{"name": "TK-Erbsen, gekocht", "amount": "300 g"}, {"name": "Knoblauchzehe", "amount": "1"}, {"name": "Hefeflocken", "amount": "2–3 EL"}, {"name": "Petersilie, frisch", "amount": "1 Bund"}, {"name": "Minze, frisch", "amount": "1 kleiner Bund"}, {"name": "Salz & Pfeffer", "amount": "n. B."}, {"name": "Weißmehl (mehr wenn zu feucht)", "amount": "½ cup (ca. 60 g)"}, {"name": "Wasser (mehr wenn zu trocken)", "amount": "¼ cup (ca. 60 ml)"}, {"name": "Öl zum Braten", "amount": "n. B."}]}, {"label": "Dip", "items": [{"name": "Sojajoghurt", "amount": "150 g"}, {"name": "Zitronensaft", "amount": "1 EL"}, {"name": "Minze & Petersilie, fein gehackt", "amount": "n. B."}, {"name": "Salz", "amount": "n. B."}]}], "steps": [{"text": "Die Hälfte der Erbsen mit Knoblauch, Hefeflocken und Wasser zu einem groben Mus mixen oder stampfen."}, {"text": "Die andere Hälfte der Erbsen, die fein gehackten Kräuter, Mehl, Salz und Pfeffer dazugeben und zu einem kombinierten Teig vermengen. Konsistenz anpassen: mehr Mehl wenn zu feucht, mehr Wasser wenn zu trocken."}, {"text": "Zu kleinen flachen Patties formen und in Öl bei mittlerer Hitze von beiden Seiten goldbraun und knusprig braten — oder bei 200°C im Ofen backen.", "time": "3–4 Min. pro Seite"}, {"text": "Alle Dip-Zutaten verrühren. Fritters mit dem Dip servieren."}], "note": "Erbsen sind eine der am meisten unterschätzten Proteinquellen — günstig, vielseitig und leicht verdaulich. Die Fritters können auch im Ofen gebacken werden für eine fettärmere Variante."}, {"id": "pfirsich-avocado-salat", "title": "Pfirsich-Avocado Sommersalat", "eyebrow": "Erfrischender Sommer-Lunch", "cookbook_name": "Paulis Kochbuch", "servings": "1 Portion", "total_time": "10 Min.", "difficulty": "Sehr einfach", "source_handle": "@healthbycaroline", "tags": ["vegan", "Salat", "unter 30 Min."], "ingredient_groups": [{"label": null, "items": [{"name": "Avocado", "amount": "1/2"}, {"name": "Pfirsich", "amount": "1"}, {"name": "Räuchertofu,  Bananenscheiben toppen und sofort servieren."}], "note": "Sojamilch hat den höchsten Proteingehalt aller Pflanzenmilchalternativen (~3,5 g/100 ml) und ist daher die beste Wahl für diesen Porridge. Mit Erdnussmus und Erbsenprotein kommt man auf ca. 25–30 g Protein pro Portion.", "meal": ["Frühstück"], "cuisine": ["International"], "dish_type": ["Frühstück"]}, {"id": "rigatoni-alla-vodka", "title": "Rigatoni alla Vodka", "eyebrow": "Cremig, in 15 Minuten fertig", "cookbook_name": "Paulis Kochbuch", "servings": "4 Portionen", "total_time": "15 Min.", "difficulty": "Sehr einfach", "source_handle": "@fitgreenmind", "tags": ["vegan", "Pasta", "unter 30 Min."], "meal": ["Mittag", "Abendessen"], "cuisine": ["Mediterran"], "dish_type": ["Pasta"], "ingredient_groups": [{"label": null, "items": [{"name": "Zwiebel", "amount": "1"}, {"name": "Knoblauchzehen", "amount": "4"}, {"name": "Öl", "amount": "etwas"}, {"name": "Chiliflocken", "amount": "1 TL"}, {"name": "Getrockneter Oregano", "amount": "1 TL"}, {"name": "Tomatenmark", "amount": "150 g"}, {"name": "Pflanzendrink", "amount": "330 ml"}, {"name": "Vodka (optional, aber empfohlen)", "amount": "80 ml"}, {"name": "Salz", "amount": "n. B."}, {"name": "Vegane Butter", "amount": "1 EL"}, {"name": "Hefeflocken (optional)", "amount": "2 EL"}, {"name": "Rigatoni oder andere Pasta", "amount": "250 g"}, {"name": "Pastawasser", "amount": "60 ml"}, {"name": "Frischer Basilikum", "amount": "1 EL"}]}], "steps": [{"text": "Zwiebel und Knoblauch fein hacken und in etwas Öl anbraten bis sie weich und leicht golden sind."}, {"text": "Chiliflocken und Oregano dazugeben, kurz mitbraten. Tomatenmark einrühren und 5–7 Minuten bei mittlerer Hitze anschwitzen — das Tomatenmark soll leicht karamellisieren.", "time": "5–7 Min."}, {"text": "Pflanzendrink, Vodka und Salz dazugeben, vegane Butter und Hefeflocken einrühren. 5 Minuten köcheln lassen.", "time": "5 Min."}, {"text": "Pasta separat nach Packungsangabe kochen. Etwas Pastawasser auffangen."}, {"text": "Pasta, Pastawasser und frischen Basilikum in die Sauce einrühren und alles gut vermengen. Sofort servieren."}], "note": "Der Vodka ist optional, gibt der Sauce aber eine besondere Tiefe und leichte Schärfe — der Alkohol verkocht komplett. Wer keinen Alkohol möchte, kann ihn weglassen: die Sauce bleibt trotzdem cremig. Das lange Anschwitzen des Tomatenmarks ist das Geheimnis dieser Sauce."}, {"id": "rote-linsen-curry", "title": "Rotes Linsen-Curry mit Spinat", "eyebrow": "Wärmendes Abendessen in einer Pfanne", "cookbook_name": "Paulis Kochbuch", "servings": "3–4 Portionen", "total_time": "30 Min.", "difficulty": "Einfach", "tags": ["vegan", "Curry", "unter 30 Min."], "ingredient_groups": [{"label": null, "items": [{"name": "Rote Linsen", "amount": "200 g"}, {"name": "Kokosmilch (Vollfett)", "amount": "400 ml"}, {"name": "Gemüsebrühe", "amount": "300 ml"}, {"name": "Dosentomaten, gehackt", "amount": "400 g"}, {"name": "Zwiebel", "amount": "1"}, {"name": "Knoblauchzehen", "amount": "3"}, {"name": "Ingwer, frisch gerieben", "amount": "2 cm"}, {"name": "Currypulver", "amount": "2 TL"}, {"name": "Kreuzkümmel", "amount": "1 TL"}, {"name": "Kurkuma", "amount": "1/2 TL"}, {"name": "Spinat, frisch oder TK", "amount": "150 g"}, {"name": "Olivenöl", "amount": "1 EL"}, {"name": "Salz & Pfeffer", "amount": "n. B."}, {"name": "Reis oder Naan (zum Servieren)", "amount": "n. B."}]}], "steps": [{"text": "Zwiebel fein würfeln und in Olivenöl glasig dünsten. Knoblauch und Ingwer dazugeben, 1 Minute mitbraten.", "time": "4 Min."}, {"text": "Currypulver, Kreuzkümmel und Kurkuma einrühren und kurz anrösten bis es duftet.", "time": "1 Min."}, {"text": "Linsen, Dosentomaten, Kokosmilch und Gemüsebrühe dazugeben, aufkochen und bei mittlerer Hitze köcheln lassen bis die Linsen weich sind.", "time": "15–18 Min."}, {"text": "Spinat unterheben und zusammenfallen lassen. Mit Salz und Pfeffer abschmecken.", "time": "2 Min."}, {"text": "Mit Reis oder Naan servieren."}], "note": "Schmeckt er Pfefferminztee als Kochflüssigkeit ist der überraschende Trick — er gibt der Suppe eine subtile Frische ohne aufdringlich zu schmecken."}, {"id": "savory-miso-oats", "title": "Herzhafte Miso-Haferflocken", "eyebrow": "Wie Congee, aber schneller", "cookbook_name": "Paulis Kochbuch", "servings": "1 Portion", "total_time": "10 Min.", "difficulty": "Sehr einfach", "source_handle": "@eatinginberlin", "tags": ["vegan", "Frühstück", "unter 30 Min."], "meal": ["Frühstück", "Mittag"], "cuisine": ["Asiatisch"], "dish_type": ["Frühstück"], "ingredient_groups": [{"label": "Basis", "items": [{"name": "Knoblauchzehen, gehackt", "amount": "2"}, {"name": "Frühlingszwiebeln", "amount": "2"}, {"name": "Haferflocken", "amount": "4 EL"}, {"name": "Wasser", "amount": "350 ml"}, {"name": "Miso-Paste", "amount": "1,5 TL"}]}, {"label": "Toppings nach Wahl", "items": [{"name": "Chiliöl", "amount": "n. B."}, {"name": "Eingelegtes Gemüse", "amount": "n. B."}, {"name": "Edamame oder Tofu", "amount": "n. B."}, {"name": "Frühlingszwiebeln, Furikake", "amount": "n. B."}]}], "steps": [{"text": "Knoblauch und Frühlingszwiebeln in einem kleinen Topf kurz in etwas Öl anschwitzen."}, {"text": "Haferflocken und Wasser dazugeben. Bei mittlerer Hitze unter Rühren köcheln lassen bis die Haferflocken cremig und der gewünschten Konsistenz entsprechen.", "time": "5–7 Min."}, {"text": "Vom Herd nehmen — wichtig: nicht mehr kochen lassen. Miso-Paste einrühren und gut auflösen.", "time": "1 Min."}, {"text": "Mit Toppings nach Wahl servieren — Chiliöl, eingelegtem Gemüse, Edamame, Tofu, Furikake oder Frühlingszwiebeln."}], "note": "Miso enthält probiotische Bakterien — deshalb nie kochen, sondern immer erst am Ende vom Herd nehmen und dann einrühren. So bleiben die gesunden Kulturen erhalten. Wer Congee oder cremige Suppen mag, wird diese Schüssel lieben."}, {"id": "schoko-avocado-mousse", "title": "Schoko-Avocado-Mousse", "eyebrow": "Cremiges Dessert, überraschend gesund", "cookbook_name": "Paulis Kochbuch", "servings": "2 Portionen", "total_time": "10 Min.", "difficulty": "Sehr einfach", "tags": ["vegan", "Dessert", "unter 30 Min."], "ingredient_groups": [{"label": null, "items": [{"name": "Reife Avocados", "amount": "2"}, {"name": "Kakaopulver (ungesüßt)", "amount": "3 EL"}, {"name": "Ahornsirup", "amount": "3 EL"}, {"name": "Sojamilch oder Kokosmilch", "amount": "3–4 EL"}, {"name": "Vanilleextrakt (optional)", "amount": "1 TL"}, {"name": "Prise Salz", "amount": "1 Prise"}]}], "steps": [{"text": "Avocados halbieren, entkernen und das Fruchtfleisch in einen Mixer oder eine Schüssel geben."}, {"text": "Kakaopulver, Ahornsirup, Sojamilch, Vanille und Salz dazugeben und glatt mixen — entweder im Mixer oder mit einem Stabmixer."}, {"text": "Probieren und nach Geschmack mehr Kakao (bitterer), Ahornsirup (süßer) oder Milch (cremiger) ergänzen."}, {"text": "Mindestens 30 Minuten kalt stellen, dann servieren.", "time": "30 Min. kühlen"}], "note": "Die Mousse schmeckt man der Avocado überhaupt nicht an, wenn sie reif genug ist — der Kakao dominiert komplett. Mit Beeren oder Cashews toppen.", "meal": ["Dessert"], "cuisine": ["International"], "dish_type": ["Dessert"]}, {"id": "shepherds-pie-linsen", "title": "Veganer Shepherd's Pie mit Linsen & roter Bete", "eyebrow": "Herbstliches Comfort Food", "cookbook_name": "Paulis Kochbuch", "servings": "4 Portionen", "total_time": "60 Min.", "difficulty": "Mittel", "tags": ["vegan", "Comfort Food", "Herbst"], "meal": ["Abendessen"], "cuisine": ["Deutsch/Europäisch"], "dish_type": ["Eintopf"], "ingredient_groups": [{"label": "Kartoffelstampf (Deckel)", "items": [{"name": "Mehlig kochende Kartoffeln", "amount": "800 g"}, {"name": "Pflanzliche Milchalternative", "amount": "100–200 ml"}, {"name": "Olivenöl", "amount": "2–3 EL"}, {"name": "Salz & Pfeffer", "amount": "n. B."}]}, {"label": "Linsen-Gemüse-Füllung", "items": [{"name": "Berglinsen", "amount": "150 g"}, {"name": "Rotes Öl (Raps- oder Olivenöl)", "amount": "2–3 EL"}, {"name": "Rote Bete, gewürfelt", "amount": "250 g"}, {"name": "Wurzelgemüse, gewürfelt (Karotten, Petersilienwurzel, Fenchel)", "amount": "250 g"}, {"name": "Rote Zwiebel, gewürfelt", "amount": "1 groß"}, {"name": "Knoblauchzehen, fein gehackt", "amount": "3"}, {"name": "Garam Masala", "amount": "1–2 TL"}, {"name": "Herbes de Provence", "amount": "1–2 TL"}, {"name": "Tomatenmark", "amount": "2 TL"}, {"name": "Balsamicoessig", "amount": "1–2 EL"}, {"name": "Gemüsebrühe", "amount": "450 ml"}, {"name": "Salz & Pfeffer", "amount": "n. B."}, {"name": "Frische Petersilie", "amount": "n. B."}]}], "steps": [{"text": "Linsen in ungesalzenem Wasser ca. 15 Min. bissfest garen und abgießen. Kartoffeln schälen und in Salzwasser weich kochen.", "time": "15 Min."}, {"text": "Währenddessen Gemüse in Öl anschwitzen. Gewürze, Tomatenmark und Gemüsebrühe dazugeben, kurz anbraten und mit etwas Wasser ablöschen."}, {"text": "Mit Balsamico, Salz und Pfeffer abschmecken. Zugedeckt ca. 15 Min. köcheln bis alles bissfest ist. Linsen unterheben.", "time": "15 Min."}, {"text": "Kartoffeln stampfen, mit Pflanzenmilch und Olivenöl cremig rühren, mit Salz und Pfeffer abschmecken."}, {"text": "Gemüse-Linsen-Mischung in eine Auflaufform geben, Kartoffelstampf klecksweise obenauf verteilen und glattstreichen. Optional: Muster mit einer Gabel einritzen."}, {"text": "Im Ofen bei 180°C ca. 25–30 Min. goldbraun backen. Mit frisch gehackten Kräutern servieren.", "time": "25–30 Min."}], "note": "Garam Masala und Herbes de Provence zusammen in einem Shepherd's Pie klingt ungewöhnlich, ergibt aber eine sehr aromatische, leicht orientalische Note. Rote Bete gibt schöne Farbe und süß-erdigen Geschmack. Glutenfrei von Haus aus."}, {"id": "tempeh-tahin-salat", "title": "Gebratener Tempeh mit Tahin-Zitronen-Dressing", "eyebrow": "Proteinbombe für die Mittagspause", "cookbook_name": "Paulis Kochbuch", "servings": "1–2 Portionen", "total_time": "20 Min.", "difficulty": "Einfach", "tags": ["vegan", "Salat", "High-Protein"], "in
